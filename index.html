                      style={opp.avatar ? { background: `url(${opp.avatar}) center/cover` } : { background: '#f5ecd5' }}
                    >
                      {!opp.avatar && opp.name.charAt(0).toUpperCase()}
                    </div>
                    <span className="font-serif">{opp.name.split(' ')[0]}</span>
                  </button>
                ))}
                <button
                  onClick={() => setShowComparePicker(false)}
                  className="px-2 py-1 font-mono text-[10px] text-stone-500 hover:text-stone-300"
                >
                  cancel
                </button>
              </div>
            </div>
          )}

          <div className="p-4 space-y-4">
            {/* Stats grid */}
            <div className="grid grid-cols-3 gap-2">
              <div className="bg-stone-950 border border-stone-800 p-3">
                <div className="font-mono text-[9px] uppercase tracking-wider text-stone-500 mb-1">Points</div>
                <div className="font-serif text-2xl text-emerald-300">{stats.totalPts}</div>
              </div>
              <div className="bg-stone-950 border border-stone-800 p-3">
                <div className="font-mono text-[9px] uppercase tracking-wider text-stone-500 mb-1">Success</div>
                <div className="font-serif text-2xl text-stone-200">
                  {stats.successRate === null ? '—' : `${stats.successRate}%`}
                </div>
              </div>
              <div className="bg-stone-950 border border-stone-800 p-3">
                <div className="font-mono text-[9px] uppercase tracking-wider text-stone-500 mb-1">Perfect</div>
                <div className="font-serif text-2xl text-amber-300">{stats.perfectCount}</div>
              </div>
            </div>

            <div className="bg-stone-950 border border-stone-800 p-3 font-mono text-[11px] text-stone-400 leading-relaxed">
              <div className="flex justify-between">
                <span>Total bets placed</span>
                <span className="text-stone-200">{stats.totalBets}</span>
              </div>
              <div className="flex justify-between">
                <span>Series settled</span>
                <span className="text-stone-200">{stats.totalSettled}</span>
              </div>
              <div className="flex justify-between">
                <span>Correct winners</span>
                <span className="text-emerald-300">{stats.correctWinners} / {stats.totalSettled || 0}</span>
              </div>
              <div className="flex justify-between">
                <span>Exact game count</span>
                <span className="text-amber-300">{stats.perfectCount} / {stats.totalSettled || 0}</span>
              </div>
            </div>

            {/* Champion pick */}
            {stats.championResult && (
              <div className={`border p-3 ${
                stats.championResult.won === true
                  ? 'bg-amber-950/30 border-amber-700/50'
                  : stats.championResult.won === false
                  ? 'bg-red-950/20 border-red-900/40'
                  : 'bg-stone-950 border-stone-800'
              }`}>
                <div className="font-mono text-[10px] uppercase tracking-wider text-stone-400 mb-1.5 flex items-center gap-1.5">
                  <Crown size={11} className="text-amber-400" />
                  Champion pick (+{POINTS_CORRECT_CHAMPION} pts)
                </div>
                <div className="font-serif text-base">
                  <span style={{ color: TEAM_DATA[stats.championResult.pick]?.color }}>
                    {TEAM_DATA[stats.championResult.pick]?.city || stats.championResult.pick}
                  </span>
                  {stats.championResult.won === true && (
                    <span className="font-mono text-[10px] text-amber-300 ml-2">CHAMPION ✓</span>
                  )}
                  {stats.championResult.won === false && (
                    <span className="font-mono text-[10px] text-red-400 ml-2">
                      actual: {TEAM_DATA[stats.championResult.actual]?.city}
                    </span>
                  )}
                </div>
              </div>
            )}

            {/* Settled bets */}
            {stats.closedBets.length > 0 && (
              <div>
                <div className="font-mono text-[10px] uppercase tracking-[0.2em] text-stone-400 mb-2">Settled</div>
                <div className="bg-stone-950 border border-stone-800 divide-y divide-stone-800">
                  {stats.closedBets.map(({ seriesId, bet, series: s, pts, result }) => {
                    const borderColor = {
                      perfect: 'border-l-amber-400',
                      partial: 'border-l-emerald-500',
                      wrong: 'border-l-red-500',
                    }[result];
                    const label = { perfect: 'PERFECT', partial: 'WINNER', wrong: 'WRONG' }[result];
                    const labelColor = { perfect: 'text-amber-300', partial: 'text-emerald-300', wrong: 'text-red-400' }[result];
                    return (
                      <button
                        key={seriesId}
                        onClick={() => onSeriesClick(s)}
                        className={`w-full text-left flex items-center gap-3 p-2.5 border-l-2 ${borderColor} hover:bg-stone-900/50 transition-colors`}
                      >
                        <div className="flex-1 min-w-0">
                          <div className="font-mono text-[10px] uppercase tracking-wider text-stone-500">
                            {s.conf} · {SERIES_LABELS[s.id]}
                          </div>
                          <div className="font-mono text-xs mt-0.5 text-stone-300">
                            Picked <span style={{ color: TEAM_DATA[bet.winner]?.color }}>{bet.winner}</span> in {bet.totalGames} → actual: <span style={{ color: TEAM_DATA[s.winner]?.color }}>{s.winner}</span> in {s.totalGames}
                          </div>
                        </div>
                        <div className="text-right flex-shrink-0">
                          <div className={`font-mono text-[9px] tracking-wider ${labelColor}`}>{label}</div>
                          <div className="font-mono text-sm tabular-nums text-stone-200">+{pts}</div>
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Locked (in progress) */}
            {stats.lockedBets.length > 0 && (
              <div>
                <div className="font-mono text-[10px] uppercase tracking-[0.2em] text-stone-400 mb-2 flex items-center gap-1.5">
                  <Lock size={10} /> In Progress
                </div>
                <div className="bg-stone-950 border border-stone-800 divide-y divide-stone-800">
                  {stats.lockedBets.map(({ seriesId, bet, series: s }) => (
                    <button
                      key={seriesId}
                      onClick={() => onSeriesClick(s)}
                      className="w-full text-left flex items-center gap-3 p-2.5 hover:bg-stone-900/50 transition-colors"
                    >
                      <div className="flex-1 min-w-0">
                        <div className="font-mono text-[10px] uppercase tracking-wider text-stone-500">
                          {s.conf} · {SERIES_LABELS[s.id]}
                        </div>
                        <div className="font-mono text-xs mt-0.5 text-stone-300">
                          Picked <span style={{ color: TEAM_DATA[bet.winner]?.color }}>{bet.winner}</span> in {bet.totalGames} · currently {s.highWins}–{s.lowWins}
                        </div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {/* Open bets */}
            {stats.openBets.length > 0 && (
              <div>
                <div className="font-mono text-[10px] uppercase tracking-[0.2em] text-stone-400 mb-2">Upcoming Picks</div>
                <div className="bg-stone-950 border border-stone-800 divide-y divide-stone-800">
                  {stats.openBets.map(({ seriesId, bet, series: s }) => (
                    <button
                      key={seriesId}
                      onClick={() => onSeriesClick(s)}
                      className="w-full text-left flex items-center gap-3 p-2.5 hover:bg-stone-900/50 transition-colors"
                    >
                      <div className="flex-1 min-w-0">
                        <div className="font-mono text-[10px] uppercase tracking-wider text-stone-500">
                          {s.conf} · {SERIES_LABELS[s.id]}
                        </div>
                        <div className="font-mono text-xs mt-0.5 text-stone-300">
                          Picked <span style={{ color: TEAM_DATA[bet.winner]?.color }}>{bet.winner}</span> in {bet.totalGames}
                        </div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            )}

            {stats.totalBets === 0 && (
              <div className="bg-stone-950 border border-stone-800 p-4 text-center text-stone-500 text-sm italic">
                No bets placed yet.
              </div>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ============================================================================
  // HEAD-TO-HEAD COMPARISON
  // Shows two players side by side, focused on series where they bet differently.
  // ============================================================================
  function HeadToHeadModal({ userA, userB, series, liveGames, onClose, onBack, onSeriesClick, onSwitchTo }) {
    useEscapeKey(onClose);
    const scrollRef = React.useRef(null);

    // Scroll modal content to top when opened or when switching focus between users.
    // Using useLayoutEffect + rAF so the reset happens after paint, ensuring the
    // scroll container is fully rendered and scrollable before we try to scroll it.
    React.useLayoutEffect(() => {
      const scrollToTop = () => {
        if (scrollRef.current) {
          scrollRef.current.scrollTop = 0;
        }
      };
      scrollToTop();
      // Run again on next frame in case content height changes after paint
      const raf = requestAnimationFrame(scrollToTop);
      return () => cancelAnimationFrame(raf);
    }, [userA.id, userB.id]);

    const calcBetPts = (bet, s, winner, totalGames) => {
      if (!winner) return 0;
      if (bet.winner !== winner) return 0;
      let pts = POINTS_CORRECT_WINNER;
      const matchupMatches = bet.loser && (bet.loser === s.high || bet.loser === s.low);
      if (matchupMatches && Number(bet.totalGames) === totalGames) pts += POINTS_CORRECT_GAMES;
      return pts;
    };

    const data = useMemo(() => {
      const a = calcProjectedPoints(userA.bets || {}, series, liveGames || {}, userA.champion);
      const b = calcProjectedPoints(userB.bets || {}, series, liveGames || {}, userB.champion);

      // Compare bets series-by-series
      const sharedSeriesIds = new Set([
        ...Object.keys(userA.bets || {}),
        ...Object.keys(userB.bets || {}),
      ]);

      const settled = []; // both bet, series closed
      const live = [];    // both bet, live-decisive
      const pending = []; // both bet, no outcome yet
      const oneSided = []; // only one of them bet on it

      let aWinsHead = 0;
      let bWinsHead = 0;
      let agreementCount = 0;
      let disagreementCount = 0;
      let agreementCorrect = 0;
      let agreementWrong = 0;

      for (const seriesId of sharedSeriesIds) {
        const s = series.find((x) => x.id === seriesId);
        if (!s) continue;
        const betA = userA.bets?.[seriesId];
        const betB = userB.bets?.[seriesId];

        if (!betA || !betB) {
          // Only one bet — note who bet and outcome
          const who = betA ? userA : userB;
          const bet = betA || betB;
          let outcome = 'pending';
          if (s.status === 'closed') {
            outcome = bet.winner === s.winner ? 'win' : 'wrong';
          }
          oneSided.push({ series: s, who, bet, outcome });
          continue;
        }

        const sameWinner = betA.winner === betB.winner;
        const sameGames = Number(betA.totalGames) === Number(betB.totalGames);

        if (sameWinner) {
          agreementCount++;
        } else {
          disagreementCount++;
        }

        // Determine resolution
        const lg = liveGames?.[`${s.high}_${s.low}`] || liveGames?.[`${s.low}_${s.high}`];
        const proj = projectSeriesFromLiveGame(s, lg);
        const isLiveDecisive = !!proj?.isDecisive;
        const isClosed = s.status === 'closed';
        const effectiveWinner = isClosed ? s.winner : isLiveDecisive ? proj.projectedWinner : null;
        const effectiveGames = isClosed ? s.totalGames : isLiveDecisive ? proj.projectedTotalGames : null;

        const ptsA = calcBetPts(betA, s, effectiveWinner, effectiveGames);
        const ptsB = calcBetPts(betB, s, effectiveWinner, effectiveGames);

        const entry = {
          series: s,
          betA,
          betB,
          sameWinner,
          sameGames,
          ptsA,
          ptsB,
          effectiveWinner,
          effectiveGames,
          isProjected: !isClosed && isLiveDecisive,
        };

        if (effectiveWinner) {
          if (ptsA > ptsB) aWinsHead++;
          else if (ptsB > ptsA) bWinsHead++;

          if (sameWinner) {
            if (betA.winner === effectiveWinner) agreementCorrect++;
            else agreementWrong++;
          }

          if (entry.isProjected) live.push(entry);
          else settled.push(entry);
        } else {
          pending.push(entry);
        }
      }

      return {
        a, b,
        settled, live, pending, oneSided,
        aWinsHead, bWinsHead,
        agreementCount, disagreementCount,
        agreementCorrect, agreementWrong,
      };
    }, [userA, userB, series, liveGames]);

    const allEntries = [...data.live, ...data.settled, ...data.pending];

    return (
      <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style={{ background: 'rgba(28, 25, 23, 0.55)' }}>
        <div ref={scrollRef} className="bg-stone-900 border-t sm:border border-stone-700 w-full max-w-xl max-h-[90vh] overflow-y-auto">
          {/* Header */}
          <div className="sticky top-0 bg-stone-900 border-b-2 border-stone-900 p-3 flex items-center justify-between gap-2 z-10">
            <div className="flex items-center gap-3 min-w-0 flex-1">
              {onBack && (
                <button
                  onClick={onBack}
                  className="flex-shrink-0 flex items-center gap-1.5 px-3 py-1.5 transition-colors"
                  style={{
                    background: '#ffffff',
                    color: '#1c1917',
                    border: '2px solid #1c1917',
                  }}
                  title="Back to profile"
                  aria-label="Back to profile"
                >
                  <span className="text-base leading-none font-bold">←</span>
                  <span className="font-mono text-[10px] uppercase tracking-wider font-bold">Back</span>
                </button>
              )}
              <div className="min-w-0">
                <div className="font-mono text-[10px] uppercase tracking-[0.25em] text-stone-500 mb-0.5">Head to Head</div>
                <div className="font-display text-lg truncate uppercase">{userA.name} vs {userB.name}</div>
              </div>
            </div>
            <button
              onClick={onClose}
              className="flex-shrink-0 flex items-center justify-center w-9 h-9 transition-colors"
              style={{
                background: '#ffffff',
                color: '#1c1917',
                border: '2px solid #1c1917',
              }}
              title="Close"
              aria-label="Close"
            >
              <X size={18} strokeWidth={2.5} />
            </button>
          </div>

          <div className="p-4 space-y-4">
            {/* Top: head-to-head record */}
            <div className="bg-gradient-to-b from-stone-950 to-stone-900 border border-stone-800 p-4">
              <div className="font-mono text-[10px] uppercase tracking-wider text-stone-500 mb-3 text-center">
                Series record (resolved)
              </div>
              <div className="flex items-center justify-between gap-2">
                <button
                  onClick={() => onSwitchTo(userA.id)}
                  className="flex-1 flex flex-col items-center gap-1.5 hover:bg-stone-800/30 p-2 transition-colors"
                >
                  <div
                    className="w-12 h-12 flex items-center justify-center font-serif border border-stone-700"
                    style={userA.avatar ? { background: `url(${userA.avatar}) center/cover` } : { background: '#f5ecd5' }}
                  >
                    {!userA.avatar && userA.name.charAt(0).toUpperCase()}
                  </div>
                  <div className="font-serif text-sm truncate max-w-full">{userA.name.split(' ')[0]}</div>
                  <div className={`font-serif text-3xl tabular-nums ${data.aWinsHead > data.bWinsHead ? 'text-emerald-300' : 'text-stone-300'}`}>
                    {data.aWinsHead}
                  </div>
                </button>
                <div className="font-mono text-[10px] uppercase text-stone-600">vs</div>
                <button
                  onClick={() => onSwitchTo(userB.id)}
                  className="flex-1 flex flex-col items-center gap-1.5 hover:bg-stone-800/30 p-2 transition-colors"
                >
                  <div
                    className="w-12 h-12 flex items-center justify-center font-serif border border-stone-700"
                    style={userB.avatar ? { background: `url(${userB.avatar}) center/cover` } : { background: '#f5ecd5' }}
                  >
                    {!userB.avatar && userB.name.charAt(0).toUpperCase()}
                  </div>
                  <div className="font-serif text-sm truncate max-w-full">{userB.name.split(' ')[0]}</div>
                  <div className={`font-serif text-3xl tabular-nums ${data.bWinsHead > data.aWinsHead ? 'text-emerald-300' : 'text-stone-300'}`}>
                    {data.bWinsHead}
                  </div>
                </button>
              </div>
              <div className="font-mono text-[10px] text-stone-500 text-center mt-2">
                series outscored each other on
              </div>
            </div>

            {/* Stat grid */}
            <div className="grid grid-cols-3 gap-2">
              <div className="bg-stone-950 border border-stone-800 p-2.5 text-center">
                <div className="font-mono text-[9px] uppercase tracking-wider text-stone-500 mb-1">Total points</div>
                <div className="flex items-center justify-around">
                  <div className="font-serif text-xl tabular-nums text-stone-200">{data.a.projected}</div>
                  <div className="font-mono text-[10px] text-stone-600">vs</div>
                  <div className="font-serif text-xl tabular-nums text-stone-200">{data.b.projected}</div>
                </div>
              </div>
              <div className="bg-stone-950 border border-stone-800 p-2.5 text-center">
                <div className="font-mono text-[9px] uppercase tracking-wider text-stone-500 mb-1">Same picks</div>
                <div className="font-serif text-xl tabular-nums text-stone-200">{data.agreementCount}</div>
                <div className="font-mono text-[9px] text-stone-500 mt-0.5">
                  {data.agreementCorrect}✓ {data.agreementWrong}✗
                </div>
              </div>
              <div className="bg-stone-950 border border-stone-800 p-2.5 text-center">
                <div className="font-mono text-[9px] uppercase tracking-wider text-stone-500 mb-1">Disagree</div>
                <div className="font-serif text-xl tabular-nums text-amber-300">{data.disagreementCount}</div>
              </div>
            </div>

            {/* Disagreements first — the meat */}
            {(() => {
              const disagreements = allEntries.filter((e) => !e.sameWinner);
              if (disagreements.length === 0) return null;
              return (
                <div>
                  <div className="font-mono text-[10px] uppercase tracking-[0.2em] text-amber-400 mb-2">
                    Where they disagree
                  </div>
                  <div className="bg-stone-950 border border-stone-800 divide-y divide-stone-800">
                    {disagreements.map(({ series: s, betA, betB, ptsA, ptsB, effectiveWinner, isProjected }) => {
                      const aWon = effectiveWinner && betA.winner === effectiveWinner;
                      const bWon = effectiveWinner && betB.winner === effectiveWinner;
                      return (
                        <button
                          key={s.id}
                          onClick={() => onSeriesClick(s)}
                          className="w-full text-left p-2.5 hover:bg-stone-900/50 transition-colors"
                        >
                          <div className="flex items-center justify-between mb-2">
                            <div className="font-mono text-[10px] uppercase tracking-wider text-stone-500">
                              {s.conf} · {SERIES_LABELS[s.id]}
                            </div>
                            {effectiveWinner && (
                              <div className={`font-mono text-[9px] tracking-wider ${isProjected ? 'text-stone-500' : 'text-stone-400'}`}>
                                {isProjected ? 'PROJECTED' : 'FINAL'}: {effectiveWinner}
                              </div>
                            )}
                            {!effectiveWinner && (
                              <div className="font-mono text-[9px] tracking-wider text-stone-600">PENDING</div>
                            )}
                          </div>
                          <div className="grid grid-cols-2 gap-2">
                            <div className={`p-2 border ${aWon ? 'border-emerald-700/50 bg-emerald-950/20' : effectiveWinner ? 'border-red-900/40 bg-red-950/10' : 'border-stone-800'}`}>
                              <div className="font-mono text-[9px] text-stone-500 mb-0.5">{userA.name.split(' ')[0]}</div>
                              <div className="font-mono text-xs">
                                <span style={{ color: TEAM_DATA[betA.winner]?.color }}>{betA.winner}</span> in {betA.totalGames}
                              </div>
                              {effectiveWinner && (
                                <div className={`font-mono text-[10px] mt-1 tabular-nums ${aWon ? 'text-emerald-300' : 'text-red-400'}`}>
                                  {isProjected ? '~' : '+'}{ptsA}
                                </div>
                              )}
                            </div>
                            <div className={`p-2 border ${bWon ? 'border-emerald-700/50 bg-emerald-950/20' : effectiveWinner ? 'border-red-900/40 bg-red-950/10' : 'border-stone-800'}`}>
                              <div className="font-mono text-[9px] text-stone-500 mb-0.5">{userB.name.split(' ')[0]}</div>
                              <div className="font-mono text-xs">
                                <span style={{ color: TEAM_DATA[betB.winner]?.color }}>{betB.winner}</span> in {betB.totalGames}
                              </div>
                              {effectiveWinner && (
                                <div className={`font-mono text-[10px] mt-1 tabular-nums ${bWon ? 'text-emerald-300' : 'text-red-400'}`}>
                                  {isProjected ? '~' : '+'}{ptsB}
                                </div>
                              )}
                            </div>
                          </div>
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })()}

            {/* Agreements — collapsed by default with summary */}
            {(() => {
              const agreements = allEntries.filter((e) => e.sameWinner);
              if (agreements.length === 0) return null;
              return (
                <div>
                  <div className="font-mono text-[10px] uppercase tracking-[0.2em] text-stone-400 mb-2">
                    Same pick on {agreements.length} series
                  </div>
                  <div className="bg-stone-950 border border-stone-800 divide-y divide-stone-800">
                    {agreements.map(({ series: s, betA, betB, sameGames, ptsA, ptsB, effectiveWinner, isProjected }) => {
                      const won = effectiveWinner && betA.winner === effectiveWinner;
                      return (
                        <button
                          key={s.id}
                          onClick={() => onSeriesClick(s)}
                          className={`w-full text-left flex items-center gap-2 p-2.5 hover:bg-stone-900/50 transition-colors border-l-2 ${
                            won ? 'border-l-emerald-500' : effectiveWinner ? 'border-l-red-500' : 'border-l-stone-700'
                          }`}
                        >
                          <div className="flex-1 min-w-0">
                            <div className="font-mono text-[10px] uppercase tracking-wider text-stone-500">
                              {s.conf} · {SERIES_LABELS[s.id]}
                            </div>
                            <div className="font-mono text-[11px] mt-0.5 text-stone-300">
                              Both: <span style={{ color: TEAM_DATA[betA.winner]?.color }}>{betA.winner}</span>
                              {sameGames ? ` in ${betA.totalGames}` : ` (${betA.totalGames} vs ${betB.totalGames})`}
                            </div>
                          </div>
                          {effectiveWinner && (
                            <div className="font-mono text-[10px] text-right flex-shrink-0">
                              <div className="text-stone-500">
                                {isProjected ? '~' : '+'}{ptsA}/{ptsB}
                              </div>
                            </div>
                          )}
                        </button>
                      );
                    })}
                  </div>
                </div>
              );
            })()}

            {/* Solo bets — only one of them */}
            {data.oneSided.length > 0 && (
              <div>
                <div className="font-mono text-[10px] uppercase tracking-[0.2em] text-stone-400 mb-2">
                  Only one bet ({data.oneSided.length})
                </div>
                <div className="bg-stone-950 border border-stone-800 divide-y divide-stone-800">
                  {data.oneSided.map(({ series: s, who, bet, outcome }) => (
                    <button
                      key={s.id}
                      onClick={() => onSeriesClick(s)}
                      className="w-full text-left flex items-center gap-2 p-2.5 hover:bg-stone-900/50 transition-colors"
                    >
                      <div className="flex-1 min-w-0">
                        <div className="font-mono text-[10px] uppercase tracking-wider text-stone-500">

  function AdminLogin({ onSuccess, onClose, expectedPassword }) {
    useEscapeKey(onClose);
    const [pw, setPw] = useState('');
    const [err, setErr] = useState(false);
    const [errMsg, setErrMsg] = useState('');

    const tryLogin = () => {
      if (!expectedPassword) {
        setErr(true);
        setErrMsg('No admin password set in basket. Add adminPassword field via Pantry dashboard.');
        return;
      }
      if (pw === expectedPassword) {
        onSuccess();
      } else {
        setErr(true);
        setErrMsg('Wrong password');
        setTimeout(() => { setErr(false); setErrMsg(''); }, 1500);
      }
    };

    return (
      <div className="fixed inset-0 z-50 flex items-center justify-center p-4" style={{ background: 'rgba(28, 25, 23, 0.55)' }}>
        <div className="bg-stone-900 border border-stone-700 w-full max-w-sm p-5">

            <div className="font-mono text-[10px] uppercase tracking-[0.25em] text-emerald-500">Admin Access</div>

              onClick={onClose}
              className="flex-shrink-0 flex items-center justify-center w-9 h-9 transition-colors"
              style={{ background: '#ffffff', color: '#1c1917', border: '2px solid #1c1917' }}
              title="Close"
              aria-label="Close"
            >
              <X size={18} strokeWidth={2.5} />
            </button>
          </div>
          <input
            type="password"
            value={pw}
            onChange={(e) => setPw(e.target.value)}
            onKeyDown={(e) => e.key === 'Enter' && tryLogin()}
            placeholder="Password"
            autoFocus
            className={`w-full bg-stone-950 border px-3 py-2.5 font-mono outline-none transition-colors ${
              err ? 'border-red-500' : 'border-stone-700 focus:border-emerald-500'

            <div className="mt-2 font-mono text-[10px] text-red-400 leading-relaxed">{errMsg}</div>

            Unlock
          </button>
        </div>
      </div>
    );
  }

  // ============================================================================
  // MAIN APP
  // ============================================================================
  function App() {
    const [users, setUsers] = useState([]);
    const [currentUserId, setCurrentUserId] = useState(null);
    const [isEditor, setIsEditor] = useState(false); // URL grants edit mode
    const [isAdmin, setIsAdmin] = useState(false);   // password unlocks admin within edit mode
    const [showAdminLogin, setShowAdminLogin] = useState(false);
    const [showAdminPanel, setShowAdminPanel] = useState(false);
    const [showRules, setShowRules] = useState(false);
    const [activeSeries, setActiveSeries] = useState(null);
    const [profileUserId, setProfileUserId] = useState(null);
    const [compareUserId, setCompareUserId] = useState(null); // set together with profileUserId for H2H
    const [syncing, setSyncing] = useState(false);
    const [lastSync, setLastSync] = useState(null);
    const [loaded, setLoaded] = useState(false);
    const [shareToast, setShareToast] = useState(null);
    const [liveData, setLiveData] = useState({ games: {}, completedGames: [], fetchedAt: null, ok: true, error: null });
    const { reactions, toggle: toggleReaction } = useReactions();

    // Series state is derived: hardcoded RESULTS take precedence, then API-derived
    // results fill in anything missing. Live games during a series can also bump
    // the in-progress record. Recomputes whenever live data refreshes.
    const series = useMemo(() => {
      const merged = { ...RESULTS };
      const built = buildSeries(BRACKET_STRUCTURE, merged); // first pass for matchup info

      if (liveData.completedGames?.length) {
        for (const s of built) {
          // Skip if already fully closed by manual RESULTS
          const manual = RESULTS[s.id];
          if (manual?.winner) continue;
          if (!s.high || !s.low) continue;

          const derived = deriveSeriesFromGames(s.high, s.low, liveData.completedGames);
          if (!derived) continue;

          // Merge into RESULTS for this build pass
          if (derived.winner) {
            merged[s.id] = {
              ...(manual || {}),
              winner: derived.winner,
              loser: derived.winner === s.high ? s.low : s.high,
              totalGames: derived.totalGames,
            };
          } else {
            // In-progress: only update record, don't override manual high/low override
            merged[s.id] = {
              ...(manual || {}),
              highWins: derived.highWins,
              lowWins: derived.lowWins,
            };
          }
        }
      }

      return buildSeries(BRACKET_STRUCTURE, merged);
    }, [liveData.completedGames]);

    // Keep activeSeries in sync as series data refreshes
    useEffect(() => {
      if (!activeSeries) return;
      const updated = series.find((s) => s.id === activeSeries.id);
      if (updated && (
        updated.high !== activeSeries.high ||
        updated.low !== activeSeries.low ||
        updated.highWins !== activeSeries.highWins ||
        updated.lowWins !== activeSeries.lowWins ||
        updated.status !== activeSeries.status ||
        updated.winner !== activeSeries.winner
      )) {
        setActiveSeries(updated);
      }
      // eslint-disable-next-line
    }, [series]);

    // Live score polling — fetches every 60s when there are likely live games
    useEffect(() => {
      let cancelled = false;
      let timer = null;

      const tick = async () => {
        const result = await fetchLiveScores();
        if (cancelled) return;
        setLiveData(result);
        // Schedule next tick — 60s when games are live, 5min otherwise
        const anyLive = Object.values(result.games || {}).some((g) => g.statusState === 'in');
        const delay = anyLive ? 60000 : 300000;
        timer = setTimeout(tick, delay);
      };

      tick();
      return () => {
        cancelled = true;
        if (timer) clearTimeout(timer);
      };
    }, []);

    // Pantry config from URL hash
    const [config, setConfig] = useState(() => parseConfig());
    const [adminPassword, setAdminPassword] = useState(null); // pulled from basket

    // Re-parse config if URL hash changes (e.g. user pastes new link)
    useEffect(() => {
      const onHashChange = () => setConfig(parseConfig());
      window.addEventListener('hashchange', onHashChange);
      return () => window.removeEventListener('hashchange', onHashChange);
    }, []);

    // Load from Pantry on mount + poll for changes
    useEffect(() => {
      let cancelled = false;
      let timer = null;

      const load = async () => {
        const data = await pantryGet(config.key, config.basket);
        if (cancelled) return;
        if (data._error) {
          // Connection problem — show hardcoded users at minimum so something renders
          if (!loaded) {
            setUsers(HARDCODED_USERS);
            setLoaded(true);
          }
          timer = setTimeout(load, PANTRY_POLL_INTERVAL_MS);
          return;
        }
        // Merge: hardcoded users always present; Pantry user with same id wins
        const pantryUsers = (data.users && Array.isArray(data.users)) ? data.users : [];
        const pantryById = Object.fromEntries(pantryUsers.map((u) => [u.id, u]));
        const merged = [
          ...HARDCODED_USERS.map((hc) => pantryById[hc.id] || hc),
          ...pantryUsers.filter((u) => !HARDCODED_USERS.some((hc) => hc.id === u.id)),
        ];
        setUsers(merged);
        if (data.lastSync) setLastSync(data.lastSync);
        if (data.adminPassword) setAdminPassword(data.adminPassword);
        if (!loaded) setLoaded(true);
        timer = setTimeout(load, PANTRY_POLL_INTERVAL_MS);
      };

      setIsEditor(config.edit);

      if (config.key && config.basket) {
        load();
      } else {
        setLoaded(true); // show config-missing screen
      }

      return () => {
        cancelled = true;
        if (timer) clearTimeout(timer);
      };
      // eslint-disable-next-line
    }, [config.key, config.basket, config.edit]);

    // Persist to Pantry whenever users change (editor + unlocked admin only)
    const lastPersistedRef = React.useRef(null);
    useEffect(() => {
      if (!loaded || !isEditor || !isAdmin) return;
      const snapshot = JSON.stringify({ users, lastSync });
      if (lastPersistedRef.current === snapshot) return;
      if (lastPersistedRef.current === null) {
        lastPersistedRef.current = snapshot;
        return;
      }
      lastPersistedRef.current = snapshot;
      // IMPORTANT: preserve adminPassword in the basket — POST replaces the whole blob
      pantryPut(config.key, config.basket, { users, lastSync, adminPassword }).then((res) => {
        if (!res.ok) {
          setShareToast({ type: 'err', msg: `Save failed: ${res.error}` });
          setTimeout(() => setShareToast(null), 4000);
        }
      });
    }, [users, lastSync, loaded, isEditor, isAdmin, config.key, config.basket, adminPassword]);

    const handleSync = async () => {
      setSyncing(true);
      const result = await fetchLiveScores();
      setLiveData(result);
      setLastSync(new Date().toISOString());
      setSyncing(false);
    };

    // Hard refresh — bust browser cache for the page itself.
    // Useful after admin pushes a new build, or when something feels stale.
    const handleHardRefresh = () => {
      // Force reload bypassing cache. Pass `true` to reload() in older browsers,
      // but modern spec ignores it; the location.reload trick with no-cache headers
      // would require server cooperation. For our static-hosted app, a plain reload
      // works since we control hosting and HTTP caching is short.
      window.location.reload();
    };

    // Auto-refresh ESPN data.
    // Cadence depends on whether there's an active game right now:
    //   - 30s when at least one game is live (fast updates during games)
    //   - 5 min otherwise (idle — we still want to detect when a new game starts,
    //     but don't need to hammer the API)
    // Runs once on mount too so we get fresh data immediately.
    useEffect(() => {
      handleSync();
    // eslint-disable-next-line
    }, []);

    // Determine if any game is currently live (statusState === 'in')
    const hasLiveGame = useMemo(() => {
      return Object.values(liveData.games || {}).some((g) => g?.statusState === 'in');
    }, [liveData.games]);

    useEffect(() => {
      const intervalMs = hasLiveGame ? 30000 : 5 * 60 * 1000;
      const t = setInterval(() => {
        if (!syncing) handleSync();
      }, intervalMs);
      return () => clearInterval(t);
      // eslint-disable-next-line
    }, [hasLiveGame]);

    const handleShareViewerLink = async () => {
      // Viewer URL needs key+basket too (Pantry requires key for reads), but no edit flag.
      const params = new URLSearchParams();
      params.set('key', config.key);
      params.set('basket', config.basket);
      const url = `${window.location.origin}${window.location.pathname}#${params.toString()}`;
      try {
        await navigator.clipboard.writeText(url);
        setShareToast({ type: 'ok', msg: 'Viewer link copied' });
      } catch {
        window.prompt('Copy this viewer link:', url);
        setShareToast({ type: 'ok', msg: 'Link ready to copy' });
      }
      setTimeout(() => setShareToast(null), 2500);
    };

    const handleAddUser = (user) => setUsers((prev) => [...prev, user]);
    const handleRemoveUser = (id) => {
      setUsers((prev) => prev.filter((u) => u.id !== id));
      if (currentUserId === id) setCurrentUserId(null);
    };

    const handleSaveBet = (userId, seriesId, bet) => {
      setUsers((prev) =>
        prev.map((u) => (u.id === userId ? { ...u, bets: { ...u.bets, [seriesId]: bet } } : u))
      );
    };

    const handleUpdateChampion = (userId, championAbbr) => {
      setUsers((prev) =>
        prev.map((u) => (u.id === userId ? { ...u, champion: championAbbr } : u))
      );
    };

    const userBets = users.find((u) => u.id === currentUserId)?.bets || {};

    const formatLastSync = () => {
      if (!lastSync) return 'never';
      const d = new Date(lastSync);
      const diff = Date.now() - d.getTime();
      if (diff < 60000) return 'just now';
      if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
      return d.toLocaleString();
    };

    // Config missing → friendly setup screen
    if (loaded && (!config.key || !config.basket)) {
      return (
        <div className="min-h-screen flex items-center justify-center p-6" style={{ fontFamily: "'Archivo', system-ui, sans-serif", background: '#ede2c8', color: '#1c1917' }}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');
            .font-serif, .font-display { font-family: 'Archivo Black', sans-serif; }
            .font-mono { font-family: 'JetBrains Mono', monospace; }
          `}</style>
          <div className="max-w-md w-full bg-white border-2 border-stone-900 p-6">
            <div className="font-mono text-[10px] uppercase tracking-[0.25em] text-orange-700 font-bold mb-2">Setup required</div>
            <h1 className="font-display text-2xl mb-3 uppercase">Missing pool config</h1>
            <p className="text-sm leading-relaxed mb-4">
              This page needs a Pantry key and basket name to load the playoff pool. Add them to the URL like this:
            </p>
            <div className="bg-amber-50 border-2 border-stone-900 p-3 font-mono text-[10px] break-all leading-relaxed mb-4">
              {window.location.origin}{window.location.pathname}<span className="text-orange-700 font-bold">#key=YOUR_KEY&basket=YOUR_BASKET</span>
            </div>
            <p className="text-xs leading-relaxed text-stone-700">
              Add <span className="font-mono font-bold">&edit=1</span> at the end if you're the admin.
            </p>
          </div>
        </div>
      );
    }

    return (
      <div className="min-h-screen text-stone-900" style={{ fontFamily: "'Archivo', system-ui, sans-serif" }}>
        <style>{`
          @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Archivo:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap');

            --paper: #ede2c8;
            --paper-light: #f5ecd5;

          input[type="range"] { accent-color: var(--terracotta); }

          /* Scrollbar tone for paper bg */
          ::-webkit-scrollbar { width: 8px; height: 8px; }
          ::-webkit-scrollbar-thumb { background: var(--ink-muted); border-radius: 0; }
          ::-webkit-scrollbar-track { background: var(--paper-light); }
        `}</style>

        <div className="min-h-screen">
          {/* Header */}
          <header
            className="sticky top-0 z-40"
            style={{
              background: '#f5ecd5',
              borderBottom: '3px solid #1c1917',
              boxShadow: '0 3px 0 0 #f59e0b',
            }}
          >
            <div className="max-w-6xl mx-auto px-4 py-3">
              <div className="flex items-center justify-between gap-3">
                {/* Logo + title */}
                <div className="flex items-center gap-3 min-w-0">
                  {/* Basketball logo — orange circle with seam pattern */}
                  <div className="relative w-11 h-11 flex-shrink-0">
                    <svg viewBox="0 0 44 44" className="w-full h-full" style={{ filter: 'drop-shadow(2px 2px 0 #1c1917)' }}>
                      <circle cx="22" cy="22" r="20" fill="#ea580c" stroke="#1c1917" strokeWidth="2.5" />
                      <path d="M 22 2 L 22 42" stroke="#1c1917" strokeWidth="2" fill="none" />
                      <path d="M 2 22 L 42 22" stroke="#1c1917" strokeWidth="2" fill="none" />
                      <path d="M 4 11 Q 22 22 4 33" stroke="#1c1917" strokeWidth="2" fill="none" />
                      <path d="M 40 11 Q 22 22 40 33" stroke="#1c1917" strokeWidth="2" fill="none" />
                    </svg>
                  </div>
                  <div className="min-w-0">
                    <div
                      className="font-display text-xl leading-none truncate uppercase"
                      style={{ color: '#1c1917', letterSpacing: '0.01em' }}
                    >
                      Sunnyvale Playoffs
                    </div>
                    <div className="font-mono text-[9px] uppercase tracking-[0.3em] mt-1" style={{ color: '#92400e' }}>
                      2026 NBA Postseason
                    </div>
                  </div>
                </div>

                {/* Right-side controls */}
                <div className="flex items-center gap-1.5">
                  {/* Last update — subtle, on light header */}
                  {lastSync && (
                    <div className="hidden md:flex items-center gap-1 px-2 py-1.5 text-[10px] font-mono" style={{ color: '#78716c' }}>
                      <RelativeTime iso={lastSync} prefix="updated " />
                    </div>
                  )}

                  {/* Sync */}
                  <button
                    onClick={handleSync}
                    disabled={syncing}
                    className="flex items-center gap-1.5 px-2.5 py-1.5 transition-colors text-xs"
                    style={{
                      background: '#ffffff',
                      color: '#1c1917',
                      border: '2px solid #1c1917',
                    }}
                    title={`Last sync: ${formatLastSync()}`}
                  >
                    <RefreshCw size={12} className={syncing ? 'animate-spin' : ''} />
                    <span className="font-mono uppercase tracking-wider hidden sm:inline">{syncing ? 'Syncing' : 'Sync'}</span>
                  </button>

                  {/* Reload */}
                  <button
                    onClick={handleHardRefresh}
                    className="flex items-center gap-1.5 px-2.5 py-1.5 transition-colors text-xs"
                    style={{
                      background: '#ffffff',
                      color: '#1c1917',
                      border: '2px solid #1c1917',
                    }}
                    title="Hard refresh (reload the page)"
                  >
                    <RotateCcw size={12} />
                    <span className="font-mono uppercase tracking-wider hidden md:inline">Reload</span>
                  </button>

                  {/* Rules */}
                  <button
                    onClick={() => setShowRules(true)}
                    className="flex items-center gap-1.5 px-2.5 py-1.5 transition-colors text-xs"
                    style={{
                      background: '#ffffff',
                      color: '#1c1917',
                      border: '2px solid #1c1917',
                    }}
                    title="How scoring works"
                  >
                    <HelpCircle size={12} />
                    <span className="font-mono uppercase tracking-wider hidden sm:inline">Rules</span>
                  </button>

                  {/* Editor-only: Share + Admin */}
                  {isEditor && (
                    <>
                      <button
                        onClick={handleShareViewerLink}
                        className="flex items-center gap-1.5 px-2.5 py-1.5 transition-colors text-xs"
                        style={{
                          background: '#ffffff',
                          color: '#1c1917',
                          border: '2px solid #1c1917',
                        }}
                        title="Copy viewer link"
                      >
                        <Share2 size={12} />
                        <span className="font-mono uppercase tracking-wider hidden sm:inline">Share</span>
                      </button>
                      {isAdmin ? (
                        <button
                          onClick={() => setShowAdminPanel(true)}
                          className="flex items-center gap-1.5 px-2.5 py-1.5 transition-colors text-xs"
                          style={{
                            background: '#047857',
                            color: '#ffffff',
                            border: '2px solid #1c1917',
                          }}
                        >
                          <Users size={12} />
                          <span className="font-mono uppercase tracking-wider hidden sm:inline">Admin</span>
                        </button>
                      ) : (
                        <button
                          onClick={() => setShowAdminLogin(true)}
                          className="flex items-center gap-1.5 px-2.5 py-1.5 transition-colors text-xs"
                          style={{
                            background: '#ffffff',
                            color: '#1c1917',
                            border: '2px solid #1c1917',
                          }}
                        >
                          <Lock size={12} />
                          <span className="font-mono uppercase tracking-wider hidden sm:inline">Admin</span>
                        </button>
                      )}
                    </>
                  )}
                </div>
              </div>

              {/* User selector — only for editors */}
              {users.length > 0 && isEditor && (
                <div className="mt-3 flex items-center gap-2 overflow-x-auto pb-1">
                  <span className="font-mono text-[10px] uppercase tracking-wider text-stone-500 flex-shrink-0">Playing as:</span>
                  <button
                    onClick={() => setCurrentUserId(null)}
                    className={`px-2.5 py-1 text-xs font-mono border flex-shrink-0 transition-colors ${
                      !currentUserId ? 'border-stone-600 bg-stone-800' : 'border-stone-800 text-stone-500 hover:text-stone-300'
                    }`}
                  >
                    None
                  </button>
                  {users.map((u) => (
                    <button
                      key={u.id}
                      onClick={() => setCurrentUserId(u.id)}
                      className={`flex items-center gap-1.5 px-2 py-1 text-xs border flex-shrink-0 transition-colors ${
                        currentUserId === u.id ? 'border-emerald-500 bg-emerald-500/10' : 'border-stone-800 hover:border-stone-600'
                      }`}
                    >
                      <div
                        className="w-5 h-5 flex items-center justify-center font-serif text-[10px]"
                        style={u.avatar ? { background: `url(${u.avatar}) center/cover` } : { background: '#f5ecd5' }}
                      >
                        {!u.avatar && u.name.charAt(0).toUpperCase()}
                      </div>
                      <span className="font-serif truncate max-w-[100px]">{u.name.split(' ')[0]}</span>
                    </button>
                  ))}
                </div>
              )}
            </div>
          </header>

          {/* Share toast */}
          {shareToast && (
            <div className="fixed top-20 left-1/2 -translate-x-1/2 z-50 bg-emerald-600 text-white px-4 py-2 font-mono text-xs uppercase tracking-wider shadow-lg">
              <Check size={12} className="inline mr-1.5" />
              {shareToast.msg}
            </div>
          )}

          {/* Last sync banner */}
          <div className="max-w-6xl mx-auto px-4 pt-3 space-y-1">
            <div className="font-mono text-[10px] uppercase tracking-wider text-stone-600">
              Bracket synced May 2, 2026 · Last manual sync: {formatLastSync()}
            </div>
            {(() => {
              const liveCount = Object.values(liveData.games).filter((g) => g.statusState === 'in').length / 2; // each game keyed twice
              if (!liveData.ok) {
                return (
                  <div className="bg-amber-950/30 border border-amber-700/40 p-2 mt-1">
                    <div className="font-mono text-[10px] text-amber-400 flex items-center gap-1.5 mb-1">
                      <span className="w-1.5 h-1.5 bg-amber-500 rounded-full"></span>
                      Live scores fetch failed
                    </div>
                    <div className="font-mono text-[10px] text-amber-200/70 break-all leading-relaxed">
                      {liveData.error || 'Unknown error'}
                    </div>
                    <div className="font-mono text-[9px] text-amber-200/40 mt-1">
                      Tip: this is expected inside the Claude preview. It should work once deployed to Netlify/GitHub Pages.
                    </div>
                  </div>
                );
              }
              if (liveCount > 0) {
                return (
                  <div className="font-mono text-[10px] text-red-400 flex items-center gap-1.5">
                    <span className="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse"></span>
                    {Math.round(liveCount)} game{liveCount === 1 ? '' : 's'} live · auto-refreshing
                  </div>
                );
              }
              return (
                <div className="font-mono text-[10px] text-stone-600 flex items-center gap-1.5">
                  <span className="w-1.5 h-1.5 bg-emerald-700 rounded-full"></span>
                  Live scores connected · no games active
                </div>
              );
            })()}
          </div>

          {/* Main */}
          <main className="max-w-6xl mx-auto px-4 py-4 space-y-4">
            {/* Compact "last updated" line, visible on mobile where the header timestamp is hidden */}
            {lastSync && (
              <div className="md:hidden flex items-center justify-end gap-2 -mb-2">
                <span className="font-mono text-[10px] text-stone-500">
                  <RelativeTime iso={lastSync} prefix="updated " />
                </span>
                {liveData.ok === false && (
                  <span className="font-mono text-[10px] text-red-400">· offline</span>
                )}
              </div>
            )}

            {/* 1. Live game banner (auto-hides if nothing live) */}
            <LiveGameBanner series={series} liveGames={liveData.games} onSeriesClick={setActiveSeries} />

            {/* 2. Current leader showcase */}
            {users.length > 0 && (
              <LeaderShowcase users={users} series={series} onUserClick={setProfileUserId} />
            )}

            {/* 3. Full leaderboard */}
            {users.length > 0 && (
              <Leaderboard users={users} series={series} liveGames={liveData.games} onUserClick={setProfileUserId} />
            )}

            {/* 4. Bracket */}
            <div className="min-w-0">
              <div className="flex items-baseline justify-between mb-3">
                <h2 className="font-serif text-2xl">The Bracket</h2>
                <span className="font-mono text-[10px] uppercase tracking-wider text-stone-500">tap a series</span>
              </div>
              <Bracket series={series} onSeriesClick={setActiveSeries} userBets={userBets} liveGames={liveData.games} />
            </div>

            {/* 5. Score history */}
            {users.length > 0 && series.some((s) => s.status === 'closed') && (
              <ScoreHistory users={users} series={series} onUserClick={setProfileUserId} />
            )}

            {/* Recent events feed */}
            {users.length > 0 && (
              <RecentEvents users={users} series={series} onSeriesClick={setActiveSeries} />
            )}

            {/* Empty / read-only states */}
            {users.length === 0 && isEditor && !isAdmin && (
              <div className="bg-amber-950/20 border border-amber-700/30 p-3 text-amber-200/80 text-xs">
                Tap <span className="font-mono">Admin</span> and enter the password to add players.
              </div>
            )}
            {users.length === 0 && !isEditor && (
              <div className="bg-stone-900 border border-stone-800 p-3 text-stone-400 text-xs">
                The pool hasn't been set up yet.
              </div>
            )}
          </main>

          <footer className="max-w-6xl mx-auto px-4 py-6 mt-6 border-t border-stone-900">
            <div className="font-mono text-[10px] uppercase tracking-wider text-stone-600 text-center">
              {POINTS_CORRECT_WINNER}pts winner · +{POINTS_CORRECT_GAMES}pt exact games (both teams must match) · {POINTS_CORRECT_CHAMPION}pts champion
            </div>
          </footer>
        </div>

        {/* Modals */}
        {showRules && <RulesModal onClose={() => setShowRules(false)} />}
        {showAdminLogin && (
          <AdminLogin
            expectedPassword={adminPassword}
            onSuccess={() => {
              setIsAdmin(true);
              setShowAdminLogin(false);
              setShowAdminPanel(true);
            }}
            onClose={() => setShowAdminLogin(false)}
          />
        )}
        {showAdminPanel && isAdmin && (
          <AdminPanel
            users={users}
            onAdd={handleAddUser}
            onRemove={handleRemoveUser}
            onUpdateChampion={handleUpdateChampion}
            onClose={() => setShowAdminPanel(false)}
          />
        )}
        {activeSeries && (
          <SeriesModal
            series={activeSeries}
            users={users}
            currentUserId={currentUserId}
            onClose={() => setActiveSeries(null)}
            onSaveBet={handleSaveBet}
            isAdmin={isAdmin}
            liveGame={findLiveGameForSeries(activeSeries, liveData.games)}
            reactions={reactions}
            onReactionToggle={toggleReaction}
          />
        )}
        {profileUserId && !compareUserId && (() => {
          const profileUser = users.find((u) => u.id === profileUserId);
          if (!profileUser) return null;
          return (
            <ProfileModal
              user={profileUser}
              users={users}
              series={series}
              onClose={() => setProfileUserId(null)}
              onSeriesClick={(s) => {
                setProfileUserId(null);
                setActiveSeries(s);
              }}
              onCompare={(opponentId) => setCompareUserId(opponentId)}
            />
          );
        })()}
        {profileUserId && compareUserId && (() => {
          const userA = users.find((u) => u.id === profileUserId);
          const userB = users.find((u) => u.id === compareUserId);
          if (!userA || !userB) return null;
          return (
            <HeadToHeadModal
              userA={userA}
              userB={userB}
              series={series}
              liveGames={liveData.games}
              onBack={() => {
                // Back to profile only — clear compare, keep profile
                setCompareUserId(null);
              }}
              onClose={() => {
                // X closes everything
                setCompareUserId(null);
                setProfileUserId(null);
              }}
              onSeriesClick={(s) => {
                setProfileUserId(null);
                setCompareUserId(null);
                setActiveSeries(s);
              }}
              onSwitchTo={(uid) => {
                if (uid === userB.id) {
                  setProfileUserId(userB.id);
                  setCompareUserId(userA.id);
                }
              }}
            />
          );
        })()}
      </div>
    );
  }


  ReactDOM.render(React.createElement(App), document.getElementById('root'));

}

if (window.__LUCIDE_READY) {
  __boot();
} else {
  document.addEventListener('lucide-ready', __boot, { once: true });
}
</script>

<script>
  // Surface any uncaught errors clearly so deploy issues are obvious
  window.addEventListener('error', (e) => {
    if (document.querySelector('#root .boot')) {
      document.getElementById('root').innerHTML =
        '<div class="boot"><div class="boot-error">Error during startup: ' +
        (e.message || 'unknown') + '<br><br>Open browser console for details.</div></div>';
    }
  });
</script>
</body>
</html>
