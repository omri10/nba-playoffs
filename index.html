  // PANTRY (getpantry.cloud) — config comes from the URL hash, not the source.
  // URL format: #key=YOUR_KEY&basket=YOUR_BASKET[&edit=1]
  //
  // The admin password lives INSIDE the basket as `adminPassword` field.
  // Set it once via Pantry's web dashboard, then admins are prompted for it
  // when they try to make changes.
  // ============================================================================
  const PANTRY_POLL_INTERVAL_MS = 30000; // viewers refresh every 30s

  function parseConfig() {
    const hash = window.location.hash.slice(1);
    const params = new URLSearchParams(hash);
    return {
      key: params.get('key') || '',
      basket: params.get('basket') || '',
      edit: params.get('edit') === '1',
    };
  }

  function pantryUrl(key, basket) {
    return `https://getpantry.cloud/apiv1/pantry/${key}/basket/${basket}`;
  }

  async function pantryGet(key, basket) {
    if (!key || !basket) return { _error: 'Missing key or basket in URL' };
    try {
      const res = await fetch(pantryUrl(key, basket), { method: 'GET', cache: 'no-store' });
      if (res.status === 400) {
        return { users: [], _empty: true };
      }
      if (!res.ok) throw new Error(`Pantry GET ${res.status}`);
      return await res.json();
    } catch (err) {
      return { _error: String(err.message || err) };
    }
  }

  async function pantryPut(key, basket, payload) {
    if (!key || !basket) return { ok: false, error: 'Missing key or basket' };
    try {
      const res = await fetch(pantryUrl(key, basket), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(`Pantry POST ${res.status}`);
      return { ok: true };

      return { ok: false, error: String(err.message || err) };
    }

  // Combine BRACKET_STRUCTURE + RESULTS into the runtime series shape the rest
  // of the app uses. Keeps all the existing fields the UI depends on.
  function buildSeries(structure, results) {
    // First pass: clone structure with empty result fields
    const series = structure.map((s) => ({
      ...s,
      high: s.high || null,
      low: s.low || null,
      highWins: 0,
      lowWins: 0,
      status: s.high && s.low ? 'inprogress' : 'scheduled',
      winner: null,
      totalGames: null,
    }));
    const byId = Object.fromEntries(series.map((s) => [s.id, s]));

    // Second pass: walk in round order, applying RESULTS and propagating winners
    for (let round = 1; round <= 4; round++) {
      for (const s of series.filter((x) => x.round === round)) {
        // For round 2+, fill teams from feeders if not overridden
        if (s.fromSeries && (!s.high || !s.low)) {
          const [feederA, feederB] = s.fromSeries.map((id) => byId[id]);
          if (feederA?.winner && feederB?.winner) {
            // Higher seed becomes 'high' for display consistency
            const seedA = TEAM_DATA[feederA.winner]?.seed ?? 99;
            const seedB = TEAM_DATA[feederB.winner]?.seed ?? 99;
            if (seedA <= seedB) {
              s.high = feederA.winner;
              s.low = feederB.winner;
            } else {
              s.high = feederB.winner;
              s.low = feederA.winner;
            }
          }
        }

        // Apply RESULTS entry if present
        const r = results[s.id];
        if (r) {
          if (r.high) s.high = r.high;
          if (r.low) s.low = r.low;
          if (r.winner) {
            s.winner = r.winner;
            s.totalGames = r.totalGames ?? null;
            s.status = 'closed';
            // Reconstruct game counts from winner + totalGames if not given
            if (r.totalGames != null) {
              const winnerWins = 4;
              const loserWins = r.totalGames - 4;
              if (s.high === r.winner) {
                s.highWins = winnerWins;
                s.lowWins = loserWins;
              } else if (s.low === r.winner) {
                s.lowWins = winnerWins;
                s.highWins = loserWins;
              }
            }
          } else {
            // In-progress — use raw counts
            if (r.highWins != null) s.highWins = r.highWins;
            if (r.lowWins != null) s.lowWins = r.lowWins;
            if ((s.highWins ?? 0) + (s.lowWins ?? 0) > 0) s.status = 'inprogress';
          }
        }

        // If matchup is set but no record yet, status is at least 'inprogress' (locked)
        if (s.high && s.low && s.status === 'scheduled' && !s.winner) {
          // Stays 'scheduled' if no games played yet — that's how bets stay open.
        }
      }
    }

    return series;
  }

  // URL-BASED STORAGE

  // LZString loader — module is fetched on demand and cached
  let _lzPromise = null;
  function getLZ() {
    if (window.LZString) return Promise.resolve(window.LZString);
    if (!_lzPromise) {
      _lzPromise = new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = 'https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js';
        s.onload = () => resolve(window.LZString);
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }
    return _lzPromise;
  }

  async function encodeState(state) {
    const LZ = await getLZ();
    const json = JSON.stringify(state);
    return LZ.compressToEncodedURIComponent(json);
  }

  async function decodeState(encoded) {
    try {
      const LZ = await getLZ();
      const json = LZ.decompressFromEncodedURIComponent(encoded);
      if (!json) return null;
      return JSON.parse(json);
    } catch {
      return null;
    }
  }

  function parseHash() {
    const hash = window.location.hash.slice(1);
    const params = new URLSearchParams(hash);
    return {
      data: params.get('data'),
      edit: params.get('edit') === '1',
    };
  }

  function buildHash({ data, edit }) {
    const params = new URLSearchParams();
    if (data) params.set('data', data);
    if (edit) params.set('edit', '1');
    return params.toString();
  }

  // Resize an image data URL to a small JPEG suitable for URL embedding.
  // Default 64x64 produces ~2-4KB per avatar.
  function resizeImage(dataUrl, maxSize = 64, quality = 0.7) {
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const scale = Math.min(maxSize / img.width, maxSize / img.height, 1);
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.onerror = () => resolve(dataUrl);
      img.src = dataUrl;
    });
  }

  // ============================================================================
  // SCORING
  // ============================================================================
  function calcPoints(userBets, series, championBet) {
    let points = 0;
    let breakdown = { winners: 0, games: 0, champion: 0 };
    for (const s of series) {
      if (s.status !== 'closed') continue;
      const bet = userBets[s.id];
      if (!bet) continue;
      if (bet.winner === s.winner) {
        points += POINTS_CORRECT_WINNER;
        breakdown.winners++;
        // Bonus for exact games requires BOTH teams in the bet to match the
        // actual matchup. If you predicted SAS over DEN and the series was
        // SAS over MIN, you get the winner points but not the games bonus.
        const matchupMatches =
          bet.loser && (bet.loser === s.high || bet.loser === s.low);
        if (matchupMatches && Number(bet.totalGames) === s.totalGames) {
          points += POINTS_CORRECT_GAMES;
          breakdown.games++;
        }
      }
    }
    // Champion bonus: if the Finals is closed and the user's champion pick won it
    const finals = series.find((s) => s.id === 'finals');
    if (championBet && finals?.status === 'closed' && finals.winner === championBet) {
      points += POINTS_CORRECT_CHAMPION;
      breakdown.champion = 1;
    }
    return { points, breakdown };
  }

  // Project what a live game's outcome would mean for series state.
  // Returns null if no projection is meaningful (game not live, series not on the brink).
  // Otherwise returns { projectedWinner, projectedTotalGames, isDecisive }.
  function projectSeriesFromLiveGame(s, liveGame) {
    if (!liveGame || liveGame.statusState !== 'in') return null;
    if (s.status !== 'inprogress' && s.status !== 'scheduled') return null;
    if (!s.high || !s.low) return null;

    // Map current live score back to series teams
    const homeIsHigh = liveGame.homeTeam === s.high;
    const liveHighScore = homeIsHigh ? liveGame.homeScore : liveGame.awayScore;
    const liveLowScore = homeIsHigh ? liveGame.awayScore : liveGame.homeScore;

    const projectedHighWins = s.highWins + (liveHighScore > liveLowScore ? 1 : 0);
    const projectedLowWins = s.lowWins + (liveLowScore > liveHighScore ? 1 : 0);
    const projectedTotalGames = s.highWins + s.lowWins + 1;

    let projectedWinner = null;
    if (projectedHighWins >= 4) projectedWinner = s.high;
    else if (projectedLowWins >= 4) projectedWinner = s.low;

    return {
      projectedWinner,
      projectedTotalGames,
      isDecisive: !!projectedWinner,
      leadingTeam: liveHighScore > liveLowScore ? s.high : liveLowScore > liveHighScore ? s.low : null,
    };
  }

  // Compute projected points: official points + provisional points from live-decisive games.
  // Returns { official, projected, delta } where delta = projected - official.
  function calcProjectedPoints(userBets, series, liveGames, championBet) {
    const official = calcPoints(userBets, series, championBet);
    let projectedPoints = official.points;
    let projectedBreakdown = {
      winners: official.breakdown.winners,
      games: official.breakdown.games,
      champion: official.breakdown.champion,
    };
    const projectedSeriesIds = []; // series whose outcome is being projected

    for (const s of series) {
      if (s.status === 'closed') continue;
      const liveGame = liveGames?.[`${s.high}_${s.low}`] || liveGames?.[`${s.low}_${s.high}`];
      const proj = projectSeriesFromLiveGame(s, liveGame);
      if (!proj || !proj.isDecisive) continue;

      projectedSeriesIds.push(s.id);
      const bet = userBets[s.id];
      if (!bet) continue;
      if (bet.winner === proj.projectedWinner) {
        projectedPoints += POINTS_CORRECT_WINNER;
        projectedBreakdown.winners++;
        // Same matchup-verification rule for projected points
        const matchupMatches =
          bet.loser && (bet.loser === s.high || bet.loser === s.low);
        if (matchupMatches && Number(bet.totalGames) === proj.projectedTotalGames) {
          projectedPoints += POINTS_CORRECT_GAMES;
          projectedBreakdown.games++;
        }
      }
    }

    return {
      official: official.points,
      projected: projectedPoints,
      delta: projectedPoints - official.points,
      breakdown: projectedBreakdown,
      officialBreakdown: official.breakdown,
      projectedSeriesIds,
    };
  }

  // ============================================================================
  // LIVE SCORES (ESPN unofficial endpoint — no auth, CORS-friendly)
  // Returns a map: { "TEAM1_TEAM2": { home, away, status, period, clock, ... } }
  // keyed by both orderings so we can look up by either team in the series.
  // ============================================================================
  const ESPN_SCOREBOARD = 'https://site.api.espn.com/apis/site/v2/sports/basketball/nba/scoreboard';

  // CORS strategy: try direct first (some hosts allow it), then fall through
  // to public CORS proxies. Each proxy wraps the URL differently.
  const FETCH_STRATEGIES = [
    // Direct — works if ESPN sends CORS headers or in non-browser environments
    (url) => url,
    // corsproxy.io — simple ?url= passthrough
    (url) => `https://corsproxy.io/?${encodeURIComponent(url)}`,
    // allorigins.win — wraps response in {contents: "..."} so handled separately
    (url) => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  ];

  async function tryFetch(strategyIndex, targetUrl) {
    const wrappedUrl = FETCH_STRATEGIES[strategyIndex](targetUrl);
    const res = await fetch(wrappedUrl, { cache: 'no-store' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    // allorigins wraps response in {contents: stringified JSON}
    if (strategyIndex === 2 && data.contents) {
      return JSON.parse(data.contents);
    }
    return data;
  }

  // ESPN uses different abbreviations for some teams than SportRadar; map to ours.
  const ESPN_TO_OUR = {
    GS: 'GSW', NO: 'NOP', NY: 'NYK', SA: 'SAS', UTAH: 'UTA', WSH: 'WAS',
  };
  function normalizeTeam(abbr) {
    if (!abbr) return abbr;
    const up = abbr.toUpperCase();
    return ESPN_TO_OUR[up] || up;
  }

  async function fetchLiveScores() {
    // Fetch today + last 21 days of NBA games. Today's request gives us live state,
    // historical requests give us completed games for series-state derivation.
    const today = new Date();
    const dates = [];
    for (let i = 0; i < 22; i++) {
      const d = new Date(today);
      d.setDate(d.getDate() - i);
      const yyyy = d.getFullYear();
      const mm = String(d.getMonth() + 1).padStart(2, '0');
      const dd = String(d.getDate()).padStart(2, '0');
      dates.push(`${yyyy}${mm}${dd}`);
    }

    // First, find a working fetch strategy using today's URL
    let workingStrategy = -1;
    let todayData = null;
    let lastError = null;
    for (let i = 0; i < FETCH_STRATEGIES.length; i++) {
      try {
        todayData = await tryFetch(i, ESPN_SCOREBOARD);
        workingStrategy = i;
        break;
      } catch (err) {
        lastError = err;
      }
    }

    if (workingStrategy === -1) {
      return {
        games: {},
        completedGames: [],
        fetchedAt: new Date().toISOString(),
        ok: false,
        error: lastError ? String(lastError.message || lastError) : 'All fetch strategies failed',
      };
    }

    // Fetch the rest of the dates in parallel using the working strategy
    const otherDates = dates.slice(1);
    const otherResults = await Promise.allSettled(
      otherDates.map((date) => tryFetch(workingStrategy, `${ESPN_SCOREBOARD}?dates=${date}`))
    );

    const allEvents = [...(todayData.events || [])];
    for (const r of otherResults) {
      if (r.status === 'fulfilled' && r.value?.events) {
        allEvents.push(...r.value.events);
      }
    }

    // Process all events into both shapes
    const games = {};         // live/upcoming today, keyed by team pair
    const completedGames = []; // all completed playoff games (flat list)
    const seenIds = new Set();

    for (const ev of allEvents) {
      if (seenIds.has(ev.id)) continue;
      seenIds.add(ev.id);
      const comp = ev.competitions?.[0];
      if (!comp) continue;
      const home = comp.competitors.find((c) => c.homeAway === 'home');
      const away = comp.competitors.find((c) => c.homeAway === 'away');
      if (!home || !away) continue;
      const homeAbbr = normalizeTeam(home.team.abbreviation);
      const awayAbbr = normalizeTeam(away.team.abbreviation);
      const statusType = comp.status?.type || {};
      // ESPN tags playoff games with competition.type.abbreviation: RD16, QTR, SEMI, FNL, CONF
      const compTypeAbbr = comp.type?.abbreviation || '';
      const isPostseason = ['RD16', 'QTR', 'SEMI', 'FNL', 'CONF'].includes(compTypeAbbr);

      const game = {
        homeTeam: homeAbbr,
        awayTeam: awayAbbr,
        homeScore: parseInt(home.score, 10) || 0,
        awayScore: parseInt(away.score, 10) || 0,
        homeLine: (home.linescores || []).map((l) => l.value),
        awayLine: (away.linescores || []).map((l) => l.value),
        statusName: statusType.name || '',
        statusState: statusType.state || '',
        statusDetail: statusType.shortDetail || statusType.detail || '',
        period: comp.status?.period || 0,
        clock: comp.status?.displayClock || '',
        completed: !!statusType.completed,
        startTime: ev.date,
        gameId: ev.id,
        isPostseason,
      };

      // Today's live/upcoming games go into the keyed lookup map (for in-game UI)
      const eventDate = new Date(ev.date);
      const isToday = eventDate.toDateString() === today.toDateString();
      if (statusType.state === 'in' || (isToday && statusType.state === 'pre')) {
        games[`${homeAbbr}_${awayAbbr}`] = game;
        games[`${awayAbbr}_${homeAbbr}`] = game;
      }

      // Completed playoff games drive bracket state derivation
      if (game.completed && isPostseason) {
        completedGames.push(game);
      }
    }

    return {
      games,
      completedGames,
      fetchedAt: new Date().toISOString(),
      ok: true,
      strategy: workingStrategy,
    };
  }

  // Derive series records from a list of completed playoff games.
  // Returns { highWins, lowWins, winner, totalGames } or null if no games found.
  function deriveSeriesFromGames(high, low, completedGames) {
    if (!high || !low || !completedGames?.length) return null;
    let highWins = 0, lowWins = 0, totalGames = 0;
    for (const g of completedGames) {
      const teams = [g.homeTeam, g.awayTeam];
      if (!teams.includes(high) || !teams.includes(low)) continue;
      totalGames++;
      const winner = g.homeScore > g.awayScore ? g.homeTeam : g.awayTeam;
      if (winner === high) highWins++;
      else if (winner === low) lowWins++;
    }
    if (totalGames === 0) return null;
    let winner = null;
    if (highWins >= 4) winner = high;
    else if (lowWins >= 4) winner = low;
    return { highWins, lowWins, winner, totalGames: winner ? totalGames : null };
  }

  // Find any live games for a series by checking team pairs
  function findLiveGameForSeries(series, liveGames) {
    if (!series || !liveGames || !series.high || !series.low) return null;
    return liveGames[`${series.high}_${series.low}`] || liveGames[`${series.low}_${series.high}`] || null;
  }

  // ============================================================================
  // useEscapeKey — closes a modal when Escape is pressed
  // ============================================================================
  function useEscapeKey(onEscape) {
    useEffect(() => {
      const handler = (e) => { if (e.key === 'Escape') onEscape(); };
      document.addEventListener('keydown', handler);
      return () => document.removeEventListener('keydown', handler);
    }, [onEscape]);
  }

  }

  function SeriesBetsList({ series, users, liveGame, reactions, onReactionToggle }) {
    const projection = projectSeriesFromLiveGame(series, liveGame);
    const isLiveDecisive = !!projection?.isDecisive;

    const bets = useMemo(() => {
      const list = [];
      for (const u of users) {
        const bet = u.bets?.[series.id];
        if (!bet) continue;
        let status = 'pending';
        let pts = 0;
        const matchupMatches = bet.loser && (bet.loser === series.high || bet.loser === series.low);
        if (series.status === 'closed') {
          if (bet.winner === series.winner) {
            pts += POINTS_CORRECT_WINNER;
            const exactGames = matchupMatches && bet.totalGames === series.totalGames;
            status = exactGames ? 'perfect' : 'partial';
            if (exactGames) pts += POINTS_CORRECT_GAMES;
          } else {
            status = 'wrong';
          }
        } else if (isLiveDecisive) {
          // Show projected outcome based on currently leading team
          if (bet.winner === projection.projectedWinner) {
            pts += POINTS_CORRECT_WINNER;
            const exactGames = matchupMatches && bet.totalGames === projection.projectedTotalGames;
            status = exactGames ? 'projected_perfect' : 'projected_partial';
            if (exactGames) pts += POINTS_CORRECT_GAMES;
          } else {
            status = 'projected_wrong';
          }
        }
        list.push({ user: u, bet, status, pts });
      }
      return list.sort((a, b) => b.pts - a.pts);
    }, [series, users, isLiveDecisive, projection]);

    const isLocked = series.status !== 'scheduled';

    return (
      <div className="pt-2">
        <div className="font-mono text-[10px] uppercase tracking-[0.2em] text-stone-400 mb-2 flex items-center justify-between">
          <span>Bets on this series</span>
          <span className="text-stone-600">{bets.length} player{bets.length === 1 ? '' : 's'}</span>
        </div>
        {isLiveDecisive && (
          <div className="bg-red-950/20 border border-red-900/40 p-2 mb-2">
            <div className="font-mono text-[10px] text-stone-300 leading-relaxed flex items-start gap-1.5">
              <span className="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse mt-1.5 flex-shrink-0"></span>
              <span>
                Projected outcome: <span style={{ color: TEAM_DATA[projection.projectedWinner]?.color }}>{projection.projectedWinner}</span> in {projection.projectedTotalGames}.
                <span className="text-stone-500"> Status updates if the lead changes.</span>
              </span>
            </div>
          </div>
        )}
        {bets.length === 0 ? (
          <div className="bg-stone-950 border border-stone-800 p-3 text-stone-500 text-xs italic">
            {isLocked ? 'No one bet on this series.' : 'No bets placed yet.'}
          </div>
        ) : (
          <div className="bg-stone-950 border border-stone-800 divide-y divide-stone-800">
            {bets.map(({ user, bet, status, pts }, i) => {
              const statusStyle = {
                perfect: 'border-l-amber-400',
                partial: 'border-l-emerald-500',
                wrong: 'border-l-red-500',
                projected_perfect: 'border-l-amber-400/60',
                projected_partial: 'border-l-emerald-500/60',
                projected_wrong: 'border-l-red-500/60',
                pending: 'border-l-stone-700',
              }[status];
              const statusLabel = {
                perfect: 'PERFECT',
                partial: 'WINNER',
                wrong: 'WRONG',
                projected_perfect: 'PERFECT*',
                projected_partial: 'WINNER*',
                projected_wrong: 'WRONG*',
                pending: '',
              }[status];
              const statusColor = {
                perfect: 'text-amber-300',
                partial: 'text-emerald-300',
                wrong: 'text-red-400',
                projected_perfect: 'text-amber-300/70',
                projected_partial: 'text-emerald-300/70',
                projected_wrong: 'text-red-400/70',
                pending: 'text-stone-400',
              }[status];
              const isProjected = status.startsWith('projected_');
              const reactionKey = `${series.id}_${user.id}`;
              return (
                <div key={user.id} className={`border-l-2 ${statusStyle}`}>
                  <div className="flex items-center gap-2.5 p-2.5">
                    <div className="w-5 font-mono text-stone-600 text-[10px] text-center flex-shrink-0">
                      {i + 1}
                    </div>
                    <div
                      className="w-7 h-7 flex items-center justify-center font-serif text-[11px] flex-shrink-0 border border-stone-700"
                      style={user.avatar ? { background: `url(${user.avatar}) center/cover` } : { background: '#f5ecd5' }}
                    >
                      {!user.avatar && user.name.charAt(0).toUpperCase()}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="font-serif text-sm truncate text-stone-200">{user.name}</div>
                      <div className="font-mono text-[10px] text-stone-500 mt-0.5">
                        Pick: <span style={{ color: TEAM_DATA[bet.winner]?.color }}>{bet.winner}</span> in {bet.totalGames}
                      </div>

                    {(isLocked || isProjected) && (

                        )}
                        {(series.status === 'closed' || isProjected) && (
                          <div className={`font-mono text-sm tabular-nums ${isProjected ? 'text-stone-400' : 'text-stone-200'}`}>
                            {isProjected ? '~' : '+'}{pts}

                  {reactions && onReactionToggle && (

        {isLiveDecisive && (

  }

  // ============================================================================
  // HOT TAKES — derived insights from bet data
  // ============================================================================
  function computeHotTakes(users, series) {
    const takes = [];

    // For each series, analyze the picks
    for (const s of series) {
      if (!s.high || !s.low) continue;
      const picksByTeam = { [s.high]: [], [s.low]: [] };
      const picksByGames = {};
      for (const u of users) {
        const bet = u.bets?.[s.id];
        if (!bet) continue;
        if (picksByTeam[bet.winner]) picksByTeam[bet.winner].push(u);
        const key = `${bet.winner}_${bet.totalGames}`;
        picksByGames[key] = picksByGames[key] || [];
        picksByGames[key].push(u);
      }

      const totalBets = picksByTeam[s.high].length + picksByTeam[s.low].length;
      if (totalBets === 0) continue;

      // Lonely vote — only one person picked a team
      if (picksByTeam[s.high].length === 1 && totalBets >= 3) {
        const u = picksByTeam[s.high][0];
        // Higher seed shouldn't be "lonely" — flip to lower-seed loneliness only
      }
      if (picksByTeam[s.low].length === 1 && totalBets >= 3) {
        const u = picksByTeam[s.low][0];
        const lowSeed = TEAM_DATA[s.low]?.seed;
        const highSeed = TEAM_DATA[s.high]?.seed;
        if (lowSeed > highSeed) {
          takes.push({
            kind: 'lonely',
            seriesId: s.id,
            user: u,
            text: `Only ${u.name.split(' ')[0]} picked ${s.low} to upset ${s.high}`,
            status: s.status,
            isCorrect: s.status === 'closed' && s.winner === s.low,
            isWrong: s.status === 'closed' && s.winner === s.high,
          });
        }
      }

      // Sweep predictions — someone called a 4-game sweep
      for (const u of users) {
        const bet = u.bets?.[s.id];
        if (!bet || bet.totalGames !== 4) continue;
        const seriesState = s.status === 'closed' ? 'closed' : 'active';
        const sweepLooksGood = s.highWins + s.lowWins <= 4 &&
          ((bet.winner === s.high && s.highWins > s.lowWins) || (bet.winner === s.low && s.lowWins > s.highWins));
        const sweepImpossible = s.highWins + s.lowWins > 4 ||
          (bet.winner === s.high && s.lowWins > 0) ||
          (bet.winner === s.low && s.highWins > 0);
        if (s.status === 'closed') {
          if (s.winner === bet.winner && s.totalGames === 4) {
            takes.push({
              kind: 'sweep_called',
              seriesId: s.id,
              user: u,
              text: `${u.name.split(' ')[0]} called the ${bet.winner} sweep — bagged it`,
              isCorrect: true,
            });
          }
        } else if (sweepLooksGood && !sweepImpossible) {
          takes.push({
            kind: 'sweep_active',
            seriesId: s.id,
            user: u,
            text: `${u.name.split(' ')[0]} predicted ${bet.winner} sweep — currently ${s.highWins}-${s.lowWins}`,
            isLive: true,
          });
        } else if (sweepImpossible && s.status !== 'scheduled') {
          takes.push({
            kind: 'sweep_dead',
            seriesId: s.id,
            user: u,
            text: `${u.name.split(' ')[0]}'s ${bet.winner} sweep dream is dead`,
            isWrong: true,
          });
        }
      }

      // Boldest call — picked the lower seed (and got it right or it's still alive)
      const lowSeedPickers = picksByTeam[s.low].filter(() => {
        const lowSeed = TEAM_DATA[s.low]?.seed;
        const highSeed = TEAM_DATA[s.high]?.seed;
        return lowSeed > highSeed;
      });
      if (s.status === 'closed' && s.winner === s.low && lowSeedPickers.length > 0 && lowSeedPickers.length < users.length / 2) {
        const names = lowSeedPickers.map((u) => u.name.split(' ')[0]).join(' & ');
        takes.push({
          kind: 'upset_called',
          seriesId: s.id,
          text: `Upset called: ${names} picked ${s.low} over ${s.high}`,
          isCorrect: true,
        });
      }

      // Going to 7 — anyone who picked "in 7"
      for (const u of users) {
        const bet = u.bets?.[s.id];
        if (!bet || bet.totalGames !== 7) continue;
        if (s.status === 'inprogress' && s.highWins + s.lowWins >= 5) {
          takes.push({
            kind: 'going_seven',
            seriesId: s.id,
            user: u,
            text: `${u.name.split(' ')[0]} called ${bet.winner} in 7 — looking smart at ${s.highWins}-${s.lowWins}`,
            isLive: true,
          });
        } else if (s.status === 'closed' && s.totalGames === 7 && s.winner === bet.winner) {
          takes.push({
            kind: 'nailed_seven',
            seriesId: s.id,
            user: u,
            text: `${u.name.split(' ')[0]} nailed ${bet.winner} in 7 — perfect call`,
            isCorrect: true,
          });
        }
      }

      // Consensus — everyone picked the same team
      if (totalBets >= 3 && (picksByTeam[s.high].length === 0 || picksByTeam[s.low].length === 0)) {
        const consensus = picksByTeam[s.high].length === 0 ? s.low : s.high;
        if (s.status === 'closed' && s.winner !== consensus) {
          takes.push({
            kind: 'consensus_wrong',
            seriesId: s.id,
            text: `Everyone picked ${consensus}. Everyone was wrong.`,
            isWrong: true,
          });
        }
      }
    }

    // Sort: live > recently closed > older
    return takes.sort((a, b) => {
      if (a.isLive && !b.isLive) return -1;
      if (b.isLive && !a.isLive) return 1;
      return 0;
    }).slice(0, 5);
  }

  function HotTakes({ users, series, onSeriesClick }) {
    const takes = useMemo(() => computeHotTakes(users, series), [users, series]);
    if (takes.length === 0) return null;

    return (
      <div className="bg-stone-900 border border-stone-800">
        <div className="border-b border-stone-800 p-3 flex items-center gap-2">
          <Flame size={14} className="text-orange-400" />
          <span className="font-mono text-[10px] uppercase tracking-[0.25em] text-stone-300">Hot Takes</span>
        </div>
        <div className="divide-y divide-stone-800">
          {takes.map((take, i) => {
            const s = series.find((x) => x.id === take.seriesId);
            const accentColor = take.isCorrect
              ? 'border-l-emerald-500'
              : take.isWrong
              ? 'border-l-red-500'
              : take.isLive
              ? 'border-l-red-400'
              : 'border-l-stone-700';
            return (
              <button
                key={i}
                onClick={() => s && onSeriesClick(s)}
                className={`w-full text-left flex items-start gap-2 p-2.5 border-l-2 ${accentColor} hover:bg-stone-800/50 transition-colors`}
              >
                <div className="flex-1 min-w-0">
                  <div className="font-serif text-sm text-stone-200 leading-snug">{take.text}</div>
                  {s && (
                    <div className="font-mono text-[10px] text-stone-500 mt-1">
                      {s.conf} · {SERIES_LABELS[s.id]}
                    </div>
                  )}
                </div>
                {take.isLive && (
                  <span className="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse mt-2 flex-shrink-0"></span>
                )}
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  // ============================================================================
  // RECENT EVENTS — what happened recently
  // ============================================================================
  function computeEvents(users, series) {
    const events = [];

    // Closed series → series closeout events with point payouts
    for (const s of series) {
      if (s.status !== 'closed' || !s.winner) continue;
      const winners = []; // (user, pts) for those who got points
      for (const u of users) {
        const bet = u.bets?.[s.id];
        if (!bet) continue;
        if (bet.winner === s.winner) {
          let pts = POINTS_CORRECT_WINNER;
          let perfect = false;
          if (bet.totalGames === s.totalGames) {
            pts += POINTS_CORRECT_GAMES;
            perfect = true;
          }
          winners.push({ user: u, pts, perfect });
        }
      }
      winners.sort((a, b) => b.pts - a.pts);
      events.push({
        seriesId: s.id,
        series: s,
        winners,
        totalBets: users.filter((u) => u.bets?.[s.id]).length,
      });
    }

    // Reverse chronological — assume hardcoded order matches conclusion order
    return events.reverse().slice(0, 5);
  }

  function RecentEvents({ users, series, onSeriesClick }) {
    const events = useMemo(() => computeEvents(users, series), [users, series]);
    if (events.length === 0) return null;

    return (
      <div className="bg-stone-900 border border-stone-800">
        <div className="border-b border-stone-800 p-3 flex items-center gap-2">
          <Clock size={14} className="text-stone-400" />
          <span className="font-mono text-[10px] uppercase tracking-[0.25em] text-stone-300">What Just Happened</span>
        </div>
        <div className="divide-y divide-stone-800">
          {events.map((ev) => {
            const { series: s, winners, totalBets } = ev;
            return (
              <button
                key={ev.seriesId}
                onClick={() => onSeriesClick(s)}
                className="w-full text-left p-3 hover:bg-stone-800/50 transition-colors"
              >
                <div className="flex items-center gap-2 mb-1.5">
                  <Crown size={12} className="text-amber-400 flex-shrink-0" />
                  <div className="font-serif text-sm text-stone-200">
                    <span style={{ color: TEAM_DATA[s.winner]?.color }}>{TEAM_DATA[s.winner]?.city}</span>
                    <span className="text-stone-400 font-mono text-xs"> closed out </span>
                    <span style={{ color: TEAM_DATA[s.winner === s.high ? s.low : s.high]?.color }}>
                      {s.winner === s.high ? s.low : s.high}
                    </span>
                    <span className="text-stone-400 font-mono text-xs"> in {s.totalGames}</span>
                  </div>
                </div>
                {totalBets > 0 ? (
                  winners.length === 0 ? (
                    <div className="font-mono text-[10px] text-stone-500 ml-5">
                      No one picked {s.winner} — {totalBets} player{totalBets === 1 ? '' : 's'} bet wrong
                    </div>
                  ) : (
                    <div className="font-mono text-[10px] text-stone-400 ml-5 space-x-2">
                      {winners.slice(0, 4).map((w) => (
                        <span key={w.user.id}>
                          {w.user.name.split(' ')[0]}{' '}
                          <span className={w.perfect ? 'text-amber-400' : 'text-emerald-400'}>+{w.pts}</span>
                          {w.perfect && <span className="text-amber-400 text-[9px]"> ✓</span>}
                        </span>
                      ))}
                      {winners.length > 4 && <span className="text-stone-600">+{winners.length - 4} more</span>}
                    </div>
                  )
                ) : (
                  <div className="font-mono text-[10px] text-stone-600 ml-5">No bets placed on this series</div>
                )}
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  // ============================================================================
  // REACTIONS — local-only per viewer (stored in localStorage)
  // ============================================================================
  const REACTION_OPTIONS = ['🔥', '😬', '🤡', '👀', '💀'];
  const REACTIONS_KEY = 'nba_pool_reactions_v1';

  function loadReactions() {
    try {
      return JSON.parse(localStorage.getItem(REACTIONS_KEY) || '{}');
    } catch {
      return {};
    }
  }
  function saveReactions(r) {
    try {
      localStorage.setItem(REACTIONS_KEY, JSON.stringify(r));
    } catch {}
  }

  function useReactions() {
    const [reactions, setReactions] = useState({});
    useEffect(() => { setReactions(loadReactions()); }, []);

    const toggle = (key, emoji) => {
      setReactions((prev) => {
        const next = { ...prev };
        const existing = next[key] || [];
        if (existing.includes(emoji)) {
          next[key] = existing.filter((e) => e !== emoji);
          if (next[key].length === 0) delete next[key];
        } else {
          next[key] = [...existing, emoji];
        }
        saveReactions(next);
        return next;
      });
    };

    return { reactions, toggle };
  }

  function ReactionBar({ reactionKey, reactions, onToggle }) {
    const [open, setOpen] = useState(false);
    const current = reactions[reactionKey] || [];

    return (
      <div className="flex items-center gap-1 flex-wrap">
        {current.map((emoji) => (
          <button
            key={emoji}
            onClick={(e) => {
              e.stopPropagation();
              onToggle(reactionKey, emoji);
            }}
            className="text-xs bg-stone-800 hover:bg-stone-700 px-1.5 py-0.5 border border-stone-700"
          >
            {emoji}
          </button>
        ))}
        <button
          onClick={(e) => {
            e.stopPropagation();
            setOpen(!open);
          }}
          className="text-xs text-stone-500 hover:text-stone-300 px-1.5 py-0.5"
        >
          +
        </button>
        {open && (
          <div className="flex items-center gap-0.5 bg-stone-950 border border-stone-700 px-1 py-0.5">
            {REACTION_OPTIONS.map((emoji) => (
              <button
                key={emoji}
                onClick={(e) => {
                  e.stopPropagation();
                  onToggle(reactionKey, emoji);
                  setOpen(false);
                }}
                className={`text-sm px-1 hover:bg-stone-800 transition-colors ${
                  current.includes(emoji) ? 'opacity-50' : ''
                }`}
              >
                {emoji}
              </button>
            ))}
          </div>
        )}
      </div>
    );
  }

  // ============================================================================
  // SCORE HISTORY — line chart of cumulative points over time. Updates only when
  // series close; live in-progress games don't affect this view (intentional —
  // projected scores live in the leaderboard).
  // ============================================================================
  function ScoreHistory({ users, series, onUserClick }) {
    const [hoveredUserId, setHoveredUserId] = useState(null);
    const [position, setPosition] = useState(null); // null = "live" (latest)
    const [isPlaying, setIsPlaying] = useState(false);

    const data = useMemo(() => {
      const closedSeries = series
        .filter((s) => s.status === 'closed')
        .sort((a, b) => a.round - b.round || a.id.localeCompare(b.id));

      const ticks = [{ label: 'Start', seriesId: null, key: 'start' }];
      for (const s of closedSeries) {
        ticks.push({
          label: SERIES_LABELS[s.id] || s.id,
          seriesId: s.id,
          round: s.round,
          conf: s.conf,
          winner: s.winner,
          loser: s.high === s.winner ? s.low : s.high,
          totalGames: s.totalGames,
          key: s.id,
        });
      }

      const closedSet = new Set();
      const lines = users.map((u) => ({ user: u, points: [0] }));

      for (let t = 1; t < ticks.length; t++) {
        closedSet.add(ticks[t].seriesId);
        const subset = series.filter((s) => closedSet.has(s.id));
        for (const line of lines) {
          const { points } = calcPoints(line.user.bets || {}, subset, line.user.champion);
          line.points.push(points);
        }
      }

      return { ticks, lines };
    }, [users, series]);

    const lastIdx = data.ticks.length - 1;
    // Effective position: null means "current", which is lastIdx
    const pos = position == null ? lastIdx : Math.min(position, lastIdx);

    // Auto-play: advance position once per interval, stop at end
    useEffect(() => {
      if (!isPlaying) return;
      if (pos >= lastIdx) {
        setIsPlaying(false);
        return;
      }
      const t = setTimeout(() => {
        setPosition((p) => {
          const cur = p == null ? lastIdx : p;
          return Math.min(cur + 1, lastIdx);
        });
      }, 1200);
      return () => clearTimeout(t);
    }, [isPlaying, pos, lastIdx]);

    if (!users.length || data.ticks.length < 2) return null;

    // Geometry
    const maxScore = Math.max(1, ...data.lines.flatMap((l) => l.points));
    const yMax = Math.ceil(maxScore / 5) * 5 + (maxScore < 5 ? 5 : 0);
    const W = 900;
    const H = 360;
    const padL = 36, padR = 16, padT = 20, padB = 48;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;
    const xStep = data.ticks.length > 1 ? chartW / (data.ticks.length - 1) : 0;
    const xAt = (i) => padL + i * xStep;
    const yAt = (v) => padT + chartH - (v / yMax) * chartH;

    const palette = ['#047857', '#1d4ed8', '#be185d', '#b45309', '#6d28d9', '#c2410c', '#0e7490', '#991b1b'];
    const colorFor = (userId) => {
      let hash = 0;
      for (let i = 0; i < userId.length; i++) hash = (hash * 31 + userId.charCodeAt(i)) | 0;
      return palette[Math.abs(hash) % palette.length];
    };

    // Build path up to current position only
    const pathFor = (line) =>
      line.points
        .slice(0, pos + 1)
        .map((p, i) => `${i === 0 ? 'M' : 'L'}${xAt(i).toFixed(1)},${yAt(p).toFixed(1)}`)
        .join(' ');

    const yTicks = [];
    const yStep = Math.max(1, Math.ceil(yMax / 4));
    for (let v = 0; v <= yMax; v += yStep) yTicks.push(v);

    // Each line's score at current position
    const linesAtPos = data.lines.map((l) => ({ ...l, scoreAtPos: l.points[pos] }));

    // Sort: hovered last (drawn on top), otherwise lowest-first so leader is on top
    const sortedLines = [...linesAtPos].sort((a, b) => {
      if (a.user.id === hoveredUserId) return 1;
      if (b.user.id === hoveredUserId) return -1;
      return a.scoreAtPos - b.scoreAtPos;
    });

    const currentTick = data.ticks[pos];
    const isAtEnd = pos === lastIdx;
    const isAtStart = pos === 0;

    const handlePlayPause = () => {
      if (isAtEnd) {
        // Play from start
        setPosition(0);
        setIsPlaying(true);
      } else {
        setIsPlaying(!isPlaying);
      }
    };

    const handleSlider = (e) => {
      setIsPlaying(false);
      setPosition(parseInt(e.target.value, 10));
    };

    return (
      <div className="bg-stone-900 border border-stone-800">
        <div className="border-b border-stone-800 p-3 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <Trophy size={14} className="text-stone-400" />
            <span className="font-mono text-[10px] uppercase tracking-[0.25em] text-stone-300">Score History</span>
          </div>
          <span className="font-mono text-[10px] text-stone-500">
            {isAtEnd ? `${lastIdx} closed` : `${pos} / ${lastIdx}`}
          </span>
        </div>

        {/* Standings at current moment */}
        <div className="px-3 pt-3">
          <div className="flex items-center justify-between gap-2 mb-1">
            <div className="font-mono text-[9px] uppercase tracking-wider text-stone-500 flex items-center gap-1.5 min-w-0">
              <Clock size={9} className="flex-shrink-0" />
              <span className="truncate">
                {pos === 0
                  ? 'Before any series closed'
                  : `After ${currentTick.conf} ${currentTick.label} · ${currentTick.winner} in ${currentTick.totalGames}`}
              </span>
            </div>
          </div>
        </div>

        <div className="p-3 pt-2">
          <svg viewBox={`0 0 ${W} ${H}`} className="w-full h-auto" preserveAspectRatio="xMidYMid meet">
            {/* Y grid + labels */}
            {yTicks.map((v) => (
              <g key={v}>
                <line
                  x1={padL} y1={yAt(v)} x2={W - padR} y2={yAt(v)}
                  stroke="#d6c9a8" strokeWidth="1"
                  strokeDasharray={v === 0 ? '0' : '2 3'}
                />
                <text x={padL - 6} y={yAt(v) + 4} textAnchor="end" fill="#57534e" fontSize="12" fontFamily="monospace">
                  {v}
                </text>
              </g>
            ))}

            {/* X-axis labels (sparse) */}
            {data.ticks.map((tick, i) => {
              const showLabel = i === 0 || i === data.ticks.length - 1 || (data.ticks.length > 6 ? i % Math.ceil(data.ticks.length / 5) === 0 : true);
              return (
                <g key={tick.key}>
                  <line x1={xAt(i)} y1={padT + chartH} x2={xAt(i)} y2={padT + chartH + 4} stroke="#1c1917" strokeWidth="1" />
                  {showLabel && (
                    <text
                      x={xAt(i)} y={padT + chartH + 18}
                      textAnchor={i === 0 ? 'start' : i === data.ticks.length - 1 ? 'end' : 'middle'}
                      fill="#1c1917" fontSize="11" fontFamily="monospace"
                    >
                      {tick.label}
                    </text>
                  )}
                  {tick.seriesId && tick.winner && showLabel && (
                    <text
                      x={xAt(i)} y={padT + chartH + 34}
                      textAnchor={i === 0 ? 'start' : i === data.ticks.length - 1 ? 'end' : 'middle'}
                      fill={TEAM_DATA[tick.winner]?.color || '#78716c'}
                      fontSize="11" fontFamily="monospace" fontWeight="600"
                    >
                      {tick.winner}
                    </text>
                  )}
                </g>
              );
            })}

            {/* Playhead vertical line */}
            {pos > 0 && (
              <line
                x1={xAt(pos)} y1={padT}
                x2={xAt(pos)} y2={padT + chartH}
                stroke="#fbbf24"
                strokeWidth="1"
                strokeDasharray="3 3"
                opacity="0.5"
              />
            )}

            {/* Lines (drawn up to position) */}
            {sortedLines.map((line) => {
              const color = colorFor(line.user.id);
              const isHovered = hoveredUserId === line.user.id;
              const isDimmed = hoveredUserId && !isHovered;
              const cx = xAt(pos);
              const cy = yAt(line.scoreAtPos);
              const avatarR = isHovered ? 16 : 13;
              const clipId = `avclip-${line.user.id}`;
              return (
                <g key={line.user.id} opacity={isDimmed ? 0.25 : 1}>
                  <path
                    d={pathFor(line)}
                    fill="none"
                    stroke={color}
                    strokeWidth={isHovered ? 2.5 : 1.5}
                    strokeLinejoin="round"
                    strokeLinecap="round"
                  />
                  {/* Avatar disc at line endpoint */}
                  <defs>
                    <clipPath id={clipId}>
                      <circle cx={cx} cy={cy} r={avatarR - 1} />
                    </clipPath>
                  </defs>
                  {/* Outer ring in player's line color */}
                  <circle
                    cx={cx} cy={cy} r={avatarR}
                    fill="#fde68a"
                    stroke={color}
                    strokeWidth={isHovered ? 2 : 1.5}
                  />
                  {line.user.avatar ? (
                    <image
                      href={line.user.avatar}
                      x={cx - avatarR + 1}
                      y={cy - avatarR + 1}
                      width={(avatarR - 1) * 2}
                      height={(avatarR - 1) * 2}
                      clipPath={`url(#${clipId})`}
                      preserveAspectRatio="xMidYMid slice"
                    />
                  ) : (
                    <text
                      x={cx} y={cy + 5}
                      textAnchor="middle"
                      fill={color}
                      fontSize="14"
                      fontFamily="serif"
                      fontWeight="600"
                    >
                      {line.user.name.charAt(0).toUpperCase()}
                    </text>
                  )}
                  {/* Name label, only when hovered */}
                  {isHovered && (() => {
                    // Position label to the left if we're near the right edge, else to the right
                    const labelOnLeft = cx > W - 80;
                    const labelX = labelOnLeft ? cx - avatarR - 6 : cx + avatarR + 6;
                    const anchor = labelOnLeft ? 'end' : 'start';
                    const firstName = line.user.name.split(' ')[0];
                    const text = `${firstName} · ${line.scoreAtPos}`;
                    // Approximate text width for background pill
                    const textW = text.length * 7.2 + 12;
                    return (
                      <g>
                        <rect
                          x={labelOnLeft ? labelX - textW : labelX - 6}
                          y={cy - 10}
                          width={textW}
                          height={20}
                          rx={3}
                          fill="#fde68a"
                          stroke={color}
                          strokeWidth="1.5"
                        />
                        <text
                          x={labelX}
                          y={cy + 5}
                          textAnchor={anchor}
                          fill="#1c1917"
                          fontSize="13"
                          fontFamily="monospace"
                          fontWeight="600"
                        >
                          {text}
                        </text>
                      </g>
                    );
                  })()}
                </g>
              );
            })}
          </svg>

          {/* Playback controls */}
          <div className="flex items-center gap-2 mt-2">
            <button
              onClick={handlePlayPause}
              className="flex items-center justify-center w-8 h-8 bg-stone-950 border border-stone-700 hover:border-emerald-500 hover:bg-emerald-950/30 transition-colors"
              title={isPlaying ? 'Pause' : isAtEnd ? 'Replay' : 'Play'}
            >
              {isPlaying ? (
                <Pause size={12} className="text-stone-200" />
              ) : isAtEnd ? (
                <RotateCcw size={11} className="text-stone-200" />
              ) : (
                <Play size={12} className="text-stone-200 ml-0.5" />
              )}
            </button>
            <input
              type="range"
              min={0}
              max={lastIdx}
              value={pos}
              onChange={handleSlider}
              className="flex-1 accent-emerald-500"
              aria-label="Series timeline"
            />
          </div>

          {/* Legend — horizontal row of avatar discs, sorted by current rank */}
          <div className="mt-3 flex items-start justify-center gap-2 sm:gap-3 flex-wrap">
            {linesAtPos
              .slice()
              .sort((a, b) => b.scoreAtPos - a.scoreAtPos)
              .map((line, rank) => {
                const color = colorFor(line.user.id);
                const isHovered = hoveredUserId === line.user.id;
                const isLeader = rank === 0;
                return (
                  <button
                    key={line.user.id}
                    onMouseEnter={() => setHoveredUserId(line.user.id)}
                    onMouseLeave={() => setHoveredUserId(null)}
                    onClick={() => {
                      if (isHovered && onUserClick) onUserClick(line.user.id);
                      else setHoveredUserId(line.user.id);
                    }}
                    className={`flex flex-col items-center gap-1 transition-opacity ${
                      hoveredUserId && !isHovered ? 'opacity-30' : 'opacity-100'
                    }`}
                    title={line.user.name}
                  >
                    <div className="relative">
                      <div
                        className="rounded-full overflow-hidden flex items-center justify-center"
                        style={{
                          width: isHovered || isLeader ? 52 : 44,
                          height: isHovered || isLeader ? 52 : 44,
                          background: line.user.avatar ? `center/cover url(${line.user.avatar})` : '#f5ecd5',
                          border: `2.5px solid ${color}`,
                          transition: 'all 0.15s ease',
                        }}
                      >
                        {!line.user.avatar && (
                          <span className="font-serif text-lg" style={{ color }}>
                            {line.user.name.charAt(0).toUpperCase()}
                          </span>
                        )}
                      </div>
                      {/* Rank badge */}
                      <div
                        className="absolute -top-1 -left-1 w-5 h-5 rounded-full flex items-center justify-center font-mono text-[10px] font-bold border"
                        style={{
                          background: isLeader ? '#fbbf24' : '#f5ecd5',
                          color: isLeader ? '#0c0a09' : '#a8a29e',
                          borderColor: isLeader ? '#fbbf24' : '#44403c',
                        }}
                      >
                        {rank + 1}
                      </div>
                    </div>
                    <div className="font-mono text-[11px] tabular-nums font-semibold" style={{ color: isHovered || isLeader ? color : '#a8a29e' }}>
                      {line.scoreAtPos}
                    </div>
                  </button>
                );
              })}
          </div>
        </div>
      </div>
    );
  }

  // ============================================================================
  // RELATIVE TIME — small helper that re-renders to keep "30s ago" fresh
  // ============================================================================
  function RelativeTime({ iso, prefix = '' }) {
    const [, force] = useState(0);
    useEffect(() => {
      const t = setInterval(() => force((n) => n + 1), 15000);
      return () => clearInterval(t);
    }, []);
    if (!iso) return <span className="text-stone-600">{prefix}never</span>;
    const ago = Date.now() - new Date(iso).getTime();
    const sec = Math.floor(ago / 1000);
    let txt;
    if (sec < 10) txt = 'just now';
    else if (sec < 60) txt = `${sec}s ago`;
    else if (sec < 3600) txt = `${Math.floor(sec / 60)}m ago`;
    else if (sec < 86400) txt = `${Math.floor(sec / 3600)}h ago`;
    else txt = `${Math.floor(sec / 86400)}d ago`;
    return <span>{prefix}{txt}</span>;
  }

      <div className="space-y-2 mb-3">
        {liveSeries.map(({ s, lg }) => {

          const homeWinning = lg.homeScore > lg.awayScore;
          const tied = lg.homeScore === lg.awayScore;

            <button
              key={s.id}

                    <span className="font-mono text-[10px] uppercase tracking-[0.25em] text-red-400 font-bold">Live</span>
                  </div>
                  <span className="font-mono text-[10px] uppercase tracking-wider text-stone-500">
                    {s.conf} · {SERIES_LABELS[s.id] || s.id}
                  </span>
                </div>
                <span className="font-mono text-[10px] tabular-nums text-stone-300">
                  Q{lg.period} · {lg.clock}
                </span>
              </div>

                  <div>
                    <div className="font-serif text-sm">{TEAM_DATA[lg.awayTeam]?.name || lg.awayTeam}</div>
                    <div className="font-mono text-[10px] text-stone-500">away</div>
                  </div>
                  <div className={`font-mono text-2xl tabular-nums ${!homeWinning && !tied ? 'text-white font-bold' : 'text-stone-400'}`}>
                    {lg.awayScore}
                  </div>
                </div>
                <div className="flex-1 flex items-center justify-between px-3 py-3" style={{ borderRight: `3px solid ${homeColor}` }}>
                  <div className={`font-mono text-2xl tabular-nums ${homeWinning && !tied ? 'text-white font-bold' : 'text-stone-400'}`}>
                    {lg.homeScore}
                  </div>
                  <div className="text-right">
                    <div className="font-serif text-sm">{TEAM_DATA[lg.homeTeam]?.name || lg.homeTeam}</div>

                  </div>

                {(s.highWins === 3 || s.lowWins === 3) && (
                  <span className="ml-2 text-amber-400 font-bold">· decisive game</span>
                )}

            </button>
          );
        })}
      </div>

  // ============================================================================
  // LEADER SHOWCASE — big top-of-page card highlighting the current leader(s)
  // ============================================================================
  function LeaderShowcase({ users, series, onUserClick }) {
    const ranked = useMemo(() => {
      const scored = users.map((u) => {
        const { points, breakdown } = calcPoints(u.bets || {}, series, u.champion);
        return { user: u, points, breakdown };
      });
      return scored.sort((a, b) => b.points - a.points);
    }, [users, series]);

    if (!ranked.length) return null;

    const top = ranked[0];
    const second = ranked[1];
    // Identify ties at the top
    const leaders = ranked.filter((r) => r.points === top.points);
    const isTie = leaders.length > 1;

    // Lead margin over next non-tied player
    const nextNonTied = ranked.find((r) => r.points < top.points);
    const lead = nextNonTied ? top.points - nextNonTied.points : null;

    // Color palette matching ScoreHistory legend
    const palette = ['#047857', '#1d4ed8', '#be185d', '#b45309', '#6d28d9', '#c2410c', '#0e7490', '#991b1b'];
    const colorFor = (id) => {
      let h = 0;
      for (let i = 0; i < id.length; i++) h = (h * 31 + id.charCodeAt(i)) | 0;
      return palette[Math.abs(h) % palette.length];
    };

    return (
      <div className="bg-gradient-to-br from-amber-950/40 via-stone-900 to-stone-900 border border-amber-700/40 mb-3 overflow-hidden">
        <div className="px-3 pt-3 pb-2 flex items-center justify-between border-b border-amber-700/20">
          <div className="flex items-center gap-2">
            <span className="text-base leading-none">👑</span>
            <span className="font-mono text-[10px] uppercase tracking-[0.25em] text-amber-300">
              {isTie ? `Tied at #1 · ${leaders.length} players` : 'Current Leader'}
            </span>
          </div>
          {lead != null && !isTie && (
            <span className="font-mono text-[10px] tabular-nums text-amber-300/80">
              +{lead} over {nextNonTied.user.name.split(' ')[0]}
            </span>
          )}
        </div>

        {/* If tied: show all leaders side by side. If solo: hero treatment */}
        {isTie ? (
          <div className="p-3 flex items-center gap-3 overflow-x-auto">
            {leaders.map((r) => {
              const color = colorFor(r.user.id);
              return (
                <button
                  key={r.user.id}
                  onClick={() => onUserClick(r.user.id)}
                  className="flex-shrink-0 flex flex-col items-center gap-1.5"
                >
                  <div
                    className="w-16 h-16 rounded-full overflow-hidden flex items-center justify-center"
                    style={{
                      background: r.user.avatar ? `center/cover url(${r.user.avatar})` : '#f5ecd5',
                      border: `3px solid ${color}`,
                    }}
                  >
                    {!r.user.avatar && (
                      <span className="font-serif text-xl" style={{ color }}>{r.user.name.charAt(0).toUpperCase()}</span>
                    )}
                  </div>
                  <div className="font-serif text-sm">{r.user.name.split(' ')[0]}</div>
                </button>
              );
            })}
            <div className="flex-shrink-0 ml-2 pl-3 border-l border-amber-700/20">
              <div className="font-mono text-[10px] uppercase tracking-wider text-amber-400 mb-0.5">Score</div>
              <div className="font-serif text-3xl text-amber-200 tabular-nums">{top.points}</div>
            </div>
          </div>
        ) : (
          <button onClick={() => onUserClick(top.user.id)} className="w-full p-4 flex items-center gap-4 hover:bg-amber-950/20 transition-colors">

  function Leaderboard({ users, series, liveGames, onUserClick }) {
    // Detect any live games that affect bracket outcome
    const liveDecisiveSeries = useMemo(() => {
      return series.filter((s) => {
        if (s.status === 'closed') return false;
        const lg = liveGames?.[`${s.high}_${s.low}`] || liveGames?.[`${s.low}_${s.high}`];
        const proj = projectSeriesFromLiveGame(s, lg);
        return proj?.isDecisive;
      });
    }, [series, liveGames]);

    const hasLiveImpact = liveDecisiveSeries.length > 0;

    // Compute most-recently-closed series + each player's delta and rank change
    // from before that series closed.
    const lastSeriesImpact = useMemo(() => {
      const closedSeries = series
        .filter((s) => s.status === 'closed')
        .sort((a, b) => a.round - b.round || a.id.localeCompare(b.id));
      if (closedSeries.length === 0) return null;
      const last = closedSeries[closedSeries.length - 1];
      const before = closedSeries.slice(0, -1);

      // Compute scores at both points in time
      const beforeScores = {};
      const afterScores = {};
      for (const u of users) {
        beforeScores[u.id] = calcPoints(u.bets || {}, before, u.champion).points;
        afterScores[u.id] = calcPoints(u.bets || {}, closedSeries, u.champion).points;
      }

      // Rank both states (highest score = rank 0)
      const beforeRanks = {};
      Object.entries(beforeScores)
        .sort(([, a], [, b]) => b - a)
        .forEach(([id], i) => { beforeRanks[id] = i; });
      const afterRanks = {};
      Object.entries(afterScores)
        .sort(([, a], [, b]) => b - a)
        .forEach(([id], i) => { afterRanks[id] = i; });

      const perUser = {};
      for (const u of users) {
        perUser[u.id] = {
          delta: afterScores[u.id] - beforeScores[u.id],
          rankChange: beforeRanks[u.id] - afterRanks[u.id], // positive = moved up
        };
      }
      return { last, perUser };
    }, [users, series]);

    const standings = useMemo(() => {
      return users
        .map((u) => {
          const proj = calcProjectedPoints(u.bets || {}, series, liveGames || {}, u.champion);
          return {
            ...u,
            official: proj.official,
            projected: proj.projected,
            delta: proj.delta,
            breakdown: proj.officialBreakdown,
            projectedBreakdown: proj.breakdown,
          };
        })
        .sort((a, b) => {
          // Sort by projected when live, otherwise by official
          if (hasLiveImpact) return b.projected - a.projected;
          return b.official - a.official;
        });
    }, [users, series, liveGames, hasLiveImpact]);

    // Calculate official-only ranking for showing rank changes
    const officialRanks = useMemo(() => {
      const sorted = [...standings].sort((a, b) => b.official - a.official);
      const ranks = {};
      sorted.forEach((u, i) => { ranks[u.id] = i; });
      return ranks;
    }, [standings]);

    if (!users.length) {
      return (
        <div className="bg-stone-900 border border-stone-800 p-6 text-center">
          <Users size={24} className="mx-auto text-stone-600 mb-2" />
          <div className="font-mono text-xs text-stone-500 uppercase tracking-wider">No players yet</div>
          <div className="text-stone-600 text-xs mt-1">Admin can add players from the top bar</div>
        </div>
      );
    }

    return (
      <div className="bg-stone-900 border border-stone-800">
        <div className="border-b border-stone-800 p-3 flex items-center justify-between">
          <div className="flex items-center gap-2">
            <Trophy size={14} className={hasLiveImpact ? 'text-red-400' : 'text-amber-400'} />
            <span className="font-mono text-[10px] uppercase tracking-[0.25em] text-stone-300">
              {hasLiveImpact ? 'Live Standings' : 'Leaderboard'}
            </span>
          </div>
          <span className="font-mono text-[10px] text-stone-500">{users.length} player{users.length === 1 ? '' : 's'}</span>
        </div>

        {hasLiveImpact && (
          <div className="bg-red-950/20 border-b border-red-900/40 px-3 py-2">
            <div className="flex items-start gap-1.5">
              <span className="w-1.5 h-1.5 bg-red-500 rounded-full animate-pulse mt-1.5 flex-shrink-0"></span>
              <div className="font-mono text-[10px] text-stone-300 leading-relaxed">
                <span className="text-red-300">Projected</span> standings shown — assumes the team currently leading wins.
                <span className="text-stone-500"> Official points in gray.</span>
              </div>
            </div>
          </div>
        )}

        <div className="divide-y divide-stone-800">
          {standings.map((u, i) => {
            const officialRank = officialRanks[u.id];
            const rankChange = hasLiveImpact ? officialRank - i : 0;
            const showProjected = hasLiveImpact && u.delta > 0;

            return (
              <button
                key={u.id}
                onClick={() => onUserClick && onUserClick(u.id)}
                className="w-full flex items-center gap-3 p-3 hover:bg-stone-800/50 transition-colors text-left"
              >
                <div className="w-7 font-mono text-base text-center flex-shrink-0">
                  {i === 0 ? (
                    <span className="text-2xl leading-none" title="Leader" aria-label="leader">👑</span>
                  ) : i === 1 ? (
                    <span className="text-2xl leading-none" title="2nd place" aria-label="second">🥈</span>
                  ) : i === 2 ? (
                    <span className="text-2xl leading-none" title="3rd place" aria-label="third">🥉</span>
                  ) : (
                    <span className="text-stone-500">{i + 1}</span>
                  )}
                  {rankChange > 0 && (
                    <div className="font-mono text-[8px] text-emerald-700 leading-none mt-0.5">↑{rankChange}</div>
                  )}
                  {rankChange < 0 && (
                    <div className="font-mono text-[8px] text-red-700 leading-none mt-0.5">↓{Math.abs(rankChange)}</div>
                  )}
                </div>
                <div
                  className="w-10 h-10 flex items-center justify-center font-serif text-sm flex-shrink-0 border-2 rounded-full overflow-hidden"
                  style={{
                    background: u.avatar ? `url(${u.avatar}) center/cover` : '#f5ecd5',
                    borderColor: i === 0 ? '#f59e0b' : i === 1 ? '#a8a29e' : '#1c1917',
                    borderWidth: i < 2 ? '3px' : '2px',
                  }}
                >
                  {!u.avatar && u.name.charAt(0).toUpperCase()}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="font-serif truncate">{u.name}</div>
                  <div className="font-mono text-[10px] text-stone-500 mt-0.5 flex items-center gap-1.5 flex-wrap">
                    {/* Last-series impact */}
                    {lastSeriesImpact && (() => {
                      const impact = lastSeriesImpact.perUser[u.id];
                      if (!impact) return null;
                      const lastLabel = `${lastSeriesImpact.last.winner} ${lastSeriesImpact.last.totalGames}`;
                      return (
                        <>
                          <span className="text-stone-500">last series:</span>
                          <span className={impact.delta > 0 ? 'text-emerald-700 font-bold' : 'text-stone-500'}>
                            {impact.delta > 0 ? `+${impact.delta}` : impact.delta} pt{Math.abs(impact.delta) === 1 ? '' : 's'}
                          </span>
                          <span className="text-stone-500">({lastLabel})</span>
                          {impact.rankChange > 0 && (
                            <span className="text-emerald-700 font-bold">↑{impact.rankChange}</span>
                          )}
                          {impact.rankChange < 0 && (
                            <span className="text-red-700 font-bold">↓{Math.abs(impact.rankChange)}</span>
                          )}
                          {impact.rankChange === 0 && (
                            <span className="text-stone-400">—</span>
                          )}
                        </>
                      );
                    })()}
                    {/* Live projection (from live decisive games) */}
                    {showProjected && (
                      <span className="text-red-700 ml-1.5 font-bold">+{u.projectedBreakdown.winners - u.breakdown.winners} projected</span>
                    )}
                    {/* If neither, show the raw breakdown so the row isn't empty */}
                    {!lastSeriesImpact && !showProjected && (
                      <span>{u.breakdown.winners}pts winners · {u.breakdown.games}pts games</span>
                    )}
                  </div>
                </div>
                <div className="text-right flex-shrink-0">
                  {hasLiveImpact ? (
                    <>
                      <div className="font-mono text-lg tabular-nums leading-none">
                        {showProjected ? (
                          <span className="text-red-300">{u.projected}</span>
                        ) : (
                          <span className="text-stone-200">{u.projected}</span>
                        )}
                      </div>
                      <div className="font-mono text-[10px] text-stone-500 mt-0.5">
                        official: {u.official}
                      </div>
                    </>
                  ) : (
                    <div className="font-mono text-lg tabular-nums">{u.official}</div>
                  )}
                </div>
              </button>
            );
          })}
        </div>
      </div>
    );
  }

  function ProfileModal({ user, users, series, onClose, onSeriesClick, onCompare }) {
    useEscapeKey(onClose);
    const [showComparePicker, setShowComparePicker] = useState(false);
    const stats = useMemo(() => {
      const allBets = Object.entries(user.bets || {});
      const closedBets = [];
      const lockedBets = [];
      const openBets = [];
      let totalPts = 0;
      let perfectCount = 0;

      for (const [seriesId, bet] of allBets) {
        const s = series.find((x) => x.id === seriesId);
        if (!s) continue;
        const entry = { seriesId, bet, series: s };
        if (s.status === 'closed') {
          let pts = 0;
          let result = 'wrong';
          if (bet.winner === s.winner) {
            pts += POINTS_CORRECT_WINNER;
            result = 'partial';
            const matchupMatches = bet.loser && (bet.loser === s.high || bet.loser === s.low);
            if (matchupMatches && bet.totalGames === s.totalGames) {
              pts += POINTS_CORRECT_GAMES;
              result = 'perfect';
              perfectCount++;
            }
          }
          totalPts += pts;
          closedBets.push({ ...entry, pts, result });
        } else if (s.status === 'inprogress') {
          lockedBets.push(entry);
        } else {
          openBets.push(entry);
        }
      }

      // Champion bonus
      const finals = series.find((s) => s.id === 'finals');
      let championResult = null;
      if (user.champion) {
        if (finals?.status === 'closed') {
          if (finals.winner === user.champion) {
            totalPts += POINTS_CORRECT_CHAMPION;
            championResult = { won: true, pick: user.champion };
          } else {
            championResult = { won: false, pick: user.champion, actual: finals.winner };
          }
        } else {
          championResult = { won: null, pick: user.champion };
        }
      }

      const correctWinners = closedBets.filter((b) => b.result !== 'wrong').length;
      const successRate = closedBets.length > 0 ? Math.round((correctWinners / closedBets.length) * 100) : null;

      return {
        closedBets: closedBets.sort((a, b) => b.pts - a.pts),
        lockedBets,
        openBets,
        totalPts,
        perfectCount,
        correctWinners,
        totalSettled: closedBets.length,
        totalBets: allBets.length,
        successRate,
        championResult,
      };
    }, [user, series]);

    return (
      <div className="fixed inset-0 z-50 flex items-end sm:items-center justify-center p-0 sm:p-4" style={{ background: 'rgba(28, 25, 23, 0.55)' }}>
        <div className="bg-stone-900 border-t sm:border border-stone-700 w-full max-w-lg max-h-[90vh] overflow-y-auto">
          <div className="sticky top-0 bg-stone-900 border-b border-stone-800 p-4 flex items-center justify-between">
            <div className="flex items-center gap-3 min-w-0">
              <div
                className="w-12 h-12 flex items-center justify-center font-serif text-lg flex-shrink-0 border border-stone-700"
                style={user.avatar ? { background: `url(${user.avatar}) center/cover` } : { background: '#f5ecd5' }}
              >
                {!user.avatar && user.name.charAt(0).toUpperCase()}
              </div>
              <div className="min-w-0">
                <div className="font-mono text-[10px] uppercase tracking-[0.25em] text-emerald-500 mb-0.5">Profile</div>
                <div className="font-serif text-xl truncate">{user.name}</div>
              </div>
            </div>
            <div className="flex items-center gap-1 flex-shrink-0">
              {users && users.length > 1 && (
                <button
                  onClick={() => setShowComparePicker(true)}
                  className="flex items-center gap-1.5 px-2.5 py-1.5 bg-stone-950 hover:bg-stone-800 border border-stone-700 text-xs"
                  title="Head-to-head"
                >
                  <Swords size={12} />
                  <span className="font-mono uppercase tracking-wider hidden sm:inline">Compare</span>
                </button>
              )}
              <button
              onClick={onClose}
              className="flex-shrink-0 flex items-center justify-center w-9 h-9 transition-colors"
              style={{ background: '#ffffff', color: '#1c1917', border: '2px solid #1c1917' }}
              title="Close"
              aria-label="Close"
            >
              <X size={18} strokeWidth={2.5} />
            </button>
            </div>
          </div>

          {showComparePicker && (
            <div className="border-b border-stone-800 p-3 bg-stone-950">
              <div className="font-mono text-[10px] uppercase tracking-wider text-stone-400 mb-2">
                Compare {user.name.split(' ')[0]} with…
              </div>
              <div className="flex flex-wrap gap-1.5">
                {users.filter((u) => u.id !== user.id).map((opp) => (
                  <button
                    key={opp.id}

                      onCompare(opp.id);

                  >
